name: Run Vak API Tests

on:
  repository_dispatch:
    types: [run-tests, send-email]
  workflow_dispatch:
    inputs:
      send_email:
        description: 'Send email report'
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event.action != 'send-email'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: |
          cat > .env << 'ENVEOF'
          ASR_BASE_URL=${{ secrets.ASR_BASE_URL }}
          ASR_API_KEY=${{ secrets.ASR_API_KEY }}
          TRANSLATE_BASE_URL=${{ secrets.TRANSLATE_BASE_URL }}
          TRANSLATE_API_KEY=${{ secrets.TRANSLATE_API_KEY }}
          TTS_BASE_URL=${{ secrets.TTS_BASE_URL }}
          TTS_API_KEY=${{ secrets.TTS_API_KEY }}
          ENVEOF

      - name: Run tests & push to sheet
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: python report_to_sheet.py

      - name: Commit & push dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet && echo "No dashboard changes" && exit 0
          git commit -m "Auto-update dashboard ($(date '+%Y-%m-%d %H:%M UTC'))"
          git push

      - name: Send email report
        if: github.event.action == 'run-tests' || github.event.inputs.send_email == 'true'
        env:
          EMAIL_WEB_APP_URL: ${{ secrets.EMAIL_WEB_APP_URL }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          DASHBOARD_URL: https://saira-uwc.github.io/Vak_automation/
        run: python email_report.py

  email-only:
    runs-on: ubuntu-latest
    if: github.event.action == 'send-email'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send email report
        env:
          EMAIL_WEB_APP_URL: ${{ secrets.EMAIL_WEB_APP_URL }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          DASHBOARD_URL: https://saira-uwc.github.io/Vak_automation/
        run: python email_report.py

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Downtime Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  :root {
    --bg-base: #0a0e1a;
    --bg-grad: radial-gradient(ellipse 80% 50% at 30% -10%, rgba(124, 58, 237, 0.13), transparent 55%),
               radial-gradient(ellipse 60% 40% at 100% 0%, rgba(220, 38, 38, 0.10), transparent 55%),
               #0a0e1a;
    --surface: #111727;
    --surface-2: #161e30;
    --surface-3: #1c2640;
    --line: #1f2a44;
    --line-2: #2a3856;
    --text: #f1f5f9;
    --text-2: #cbd5e1;
    --muted: #94a3b8;
    --faint: #64748b;
    --brand: #a78bfa;
    --brand-2: #c4b5fd;
    --brand-glow: rgba(167, 139, 250, 0.22);
    --ok: #10b981;
    --ok-soft: rgba(16, 185, 129, 0.12);
    --ok-line: rgba(16, 185, 129, 0.30);
    --warn: #f59e0b;
    --warn-soft: rgba(245, 158, 11, 0.12);
    --warn-line: rgba(245, 158, 11, 0.32);
    --err: #ef4444;
    --err-bright: #f87171;
    --err-soft: rgba(239, 68, 68, 0.10);
    --err-line: rgba(239, 68, 68, 0.32);
    --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.03) inset, 0 0 0 1px var(--line);
  }
  body {
    margin: 0; padding: 0;
    background: var(--bg-grad); background-attachment: fixed;
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 18px 20px 60px; }

  /* === Header (1 row) === */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 4px 0 14px; border-bottom: 1px solid var(--line); margin-bottom: 14px; flex-wrap: wrap; }
  .topbar h1 { margin: 0; font-size: 20px; font-weight: 800; letter-spacing: -0.02em; background: linear-gradient(180deg, #ffffff, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; }
  .topbar h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--err-bright); box-shadow: 0 0 0 4px rgba(239,68,68,0.18), 0 0 14px var(--err); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px rgba(239,68,68,0.12), 0 0 12px var(--err); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0.20), 0 0 20px var(--err); } }
  .topbar .right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .last-fetched { font-size: 11px; color: var(--faint); }
  .last-fetched .v { color: var(--text-2); font-weight: 500; font-variant-numeric: tabular-nums; }
  .pills { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--line); padding: 2px; border-radius: 8px; }
  .pill { background: transparent; border: 0; color: var(--muted); padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .pill:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .pill.active { background: linear-gradient(180deg, rgba(167,139,250,0.22), rgba(167,139,250,0.08)); color: var(--brand-2); box-shadow: 0 0 0 1px rgba(167,139,250,0.4) inset; }
  .refresh { background: var(--surface); border: 1px solid var(--line); color: var(--muted); padding: 5px 11px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; }
  .refresh:hover { color: var(--text); border-color: var(--line-2); }
  .refresh .arrow { display: inline-block; transition: transform 0.4s ease; }
  .refresh.spinning .arrow { animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === Stats === */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--surface); border-radius: 10px; padding: 11px 14px; box-shadow: var(--shadow-card); display: flex; align-items: center; gap: 12px; min-width: 0; }
  .stat .ic { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); flex-shrink: 0; }
  .stat .text { display: flex; flex-direction: column; min-width: 0; }
  .stat .l { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; color: var(--faint); text-transform: uppercase; }
  .stat .v { font-size: 22px; font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; margin-top: 1px; }
  .stat .v .of { font-size: 13px; font-weight: 600; color: var(--faint); margin-left: 4px; }
  .stat.danger .v { color: var(--err-bright); }
  .stat.danger .ic { background: var(--err); box-shadow: 0 0 8px var(--err); }
  .stat.ok .v { color: var(--ok); }
  .stat.ok .ic { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .stat.brand .v { color: var(--brand-2); }
  .stat.brand .ic { background: var(--brand); box-shadow: 0 0 8px var(--brand); }
  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }

  /* === Two-col layout === */
  .twocol { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 1080px) { .twocol { grid-template-columns: minmax(0, 1fr) 320px; } }

  /* === Calendar card === */
  .card { background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-card); margin-bottom: 14px; overflow: hidden; }
  .card-head { padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--surface-2); display: flex; align-items: center; gap: 10px; }
  .card-head .t { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: 0.1px; }
  .card-head .t .sub { font-weight: 500; color: var(--muted); margin-left: 8px; font-size: 11px; }
  .card-head .legend { margin-left: auto; display: inline-flex; gap: 12px; font-size: 10px; color: var(--faint); font-weight: 500; }
  .card-head .legend .lg { display: inline-flex; align-items: center; gap: 5px; }
  .card-head .legend .sw { width: 12px; height: 12px; border-radius: 3px; }

  .cal { padding: 14px 16px; }
  .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 8px; }
  .cal-dow .d { font-size: 10px; font-weight: 700; color: var(--faint); text-transform: uppercase; text-align: center; letter-spacing: 0.6px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-day {
    aspect-ratio: 1.45 / 1;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 8px;
    cursor: pointer; user-select: none;
    transition: all 0.12s; position: relative;
    display: flex; flex-direction: column;
    min-height: 64px;
  }
  .cal-day.empty { background: transparent; border: 0; cursor: default; pointer-events: none; }
  .cal-day:not(.empty):hover { border-color: var(--line-2); transform: translateY(-1px); }
  .cal-day.is-today { border-color: var(--brand); box-shadow: 0 0 0 1px var(--brand) inset, 0 0 16px var(--brand-glow); }
  .cal-day.is-active { box-shadow: 0 0 0 2px var(--brand) inset, 0 0 22px var(--brand-glow); }
  .cal-day .date {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 12px; font-weight: 700; color: var(--text-2);
    letter-spacing: -0.02em; line-height: 1; margin-bottom: 6px;
  }
  .cal-day.is-today .date { color: var(--brand-2); }
  .cal-day .date .num { font-size: 13px; }
  .cal-day .date .mo { font-size: 9px; color: var(--faint); font-weight: 600; }
  .cal-day .meta { font-size: 10px; color: var(--faint); margin-top: auto; font-weight: 600; line-height: 1.2; }

  /* Day color tints */
  .cal-day.sev-ok { background: linear-gradient(180deg, rgba(16,185,129,0.18), rgba(16,185,129,0.05)); border-color: rgba(16,185,129,0.32); }
  .cal-day.sev-ok .meta { color: var(--ok); }
  .cal-day.sev-warn { background: linear-gradient(180deg, rgba(245,158,11,0.20), rgba(245,158,11,0.06)); border-color: rgba(245,158,11,0.40); }
  .cal-day.sev-warn .meta { color: var(--warn); }
  .cal-day.sev-danger { background: linear-gradient(180deg, rgba(239,68,68,0.22), rgba(239,68,68,0.08)); border-color: rgba(239,68,68,0.42); }
  .cal-day.sev-danger .meta { color: var(--err-bright); }
  .cal-day.sev-norun { background: var(--surface-2); border-style: dashed; border-color: var(--line); }
  .cal-day.sev-norun .meta { color: var(--faint); font-style: italic; }

  .cal-day .proj-dots { display: flex; gap: 2px; margin-top: 4px; }
  .cal-day .proj-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(148,163,184,0.18); }
  .cal-day .proj-dot.ok { background: var(--ok); }
  .cal-day .proj-dot.warn { background: var(--warn); }
  .cal-day .proj-dot.fail { background: var(--err); }

  /* Day detail panel */
  .detail-card { background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-card); margin-bottom: 14px; overflow: hidden; }
  .detail-head { padding: 14px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; background: linear-gradient(180deg, rgba(167,139,250,0.10), rgba(167,139,250,0.02)); border-bottom: 1px solid var(--line); }
  .detail-head .nm { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.01em; }
  .detail-head .rel { font-size: 10px; font-weight: 700; color: var(--brand-2); letter-spacing: 0.6px; text-transform: uppercase; background: var(--brand-glow); padding: 3px 9px; border-radius: 999px; }
  .detail-head .summary { font-size: 12px; color: var(--muted); margin-left: 4px; }
  .detail-head .summary strong { color: var(--err-bright); font-weight: 700; }
  .detail-head .summary.ok { color: var(--ok); }
  .detail-head .close { background: var(--surface-2); border: 1px solid var(--line); color: var(--muted); width: 26px; height: 26px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; margin-left: auto; }
  .detail-head .close:hover { color: var(--text); border-color: var(--line-2); }

  .impacted { padding: 14px 16px; }
  .imp-proj { padding: 12px 0; border-top: 1px solid var(--line); }
  .imp-proj:first-child { border-top: 0; padding-top: 4px; }
  .imp-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .imp-name { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
  .imp-name .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
  .imp-name .stat-dot.warn { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .imp-name .stat-dot.danger { background: var(--err); box-shadow: 0 0 8px var(--err); }
  .imp-summary { font-size: 11px; color: var(--muted); }
  .imp-summary strong { color: var(--err-bright); font-weight: 700; }
  .imp-link { font-size: 11px; color: var(--brand); text-decoration: none; padding: 2px 7px; border-radius: 4px; margin-left: auto; }
  .imp-link:hover { background: var(--brand-glow); }

  .run { background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; }
  .run-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 12px; }
  .run-time { font-family: "JetBrains Mono", monospace; font-weight: 600; color: var(--err-bright); min-width: 76px; font-size: 12px; letter-spacing: -0.02em; }
  .run-counts { color: var(--text); font-weight: 500; }
  .run-counts .x { color: var(--err-bright); font-weight: 800; font-size: 13px; }
  .run-counts .of { color: var(--muted); }
  .run-pass { font-size: 10px; color: var(--faint); font-variant-numeric: tabular-nums; padding: 2px 7px; background: var(--surface-3); border-radius: 4px; }
  .run-extra { font-size: 10px; color: var(--muted); margin-left: auto; padding: 2px 7px; background: var(--surface-3); border-radius: 4px; }
  .fails-preview { margin-top: 8px; font-size: 11px; }
  .fails-preview ul { margin: 0; padding: 0; list-style: none; }
  .fails-preview li { padding: 6px 0; border-top: 1px solid var(--line); }
  .fails-preview li:first-child { border-top: 0; padding-top: 4px; }
  .fails-preview .ftitle { color: var(--text-2); font-weight: 600; font-size: 11px; }
  .fails-preview .fmod { color: var(--brand-2); font-size: 9px; margin-left: 6px; padding: 1px 6px; background: var(--brand-glow); border-radius: 4px; font-weight: 600; letter-spacing: 0.2px; }
  .fails-preview .ferr { color: var(--faint); font-size: 10px; margin-top: 3px; word-break: break-word; line-height: 1.4; font-family: "JetBrains Mono", monospace; max-height: 32px; overflow: hidden; }
  .fails-more { color: var(--brand); font-size: 10px; cursor: pointer; margin-top: 6px; font-weight: 700; user-select: none; display: inline-block; padding: 3px 7px; border-radius: 5px; }
  .fails-more:hover { background: var(--brand-glow); }

  /* Sidebar - downtime list */
  .ts-list { padding: 6px 0; max-height: 720px; overflow-y: auto; }
  .ts-item { padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer; transition: background 0.1s; }
  .ts-item:last-child { border-bottom: 0; }
  .ts-item:hover { background: rgba(255,255,255,0.025); }
  .ts-item.is-active { background: rgba(167,139,250,0.08); }
  .ts-row1 { display: flex; align-items: baseline; gap: 8px; }
  .ts-date { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  .ts-rel { font-size: 9px; font-weight: 700; color: var(--brand-2); letter-spacing: 0.5px; text-transform: uppercase; padding: 2px 6px; background: var(--brand-glow); border-radius: 999px; }
  .ts-rel.faint { color: var(--faint); background: rgba(148,163,184,0.08); }
  .ts-count { margin-left: auto; font-size: 10px; font-weight: 700; color: var(--err-bright); background: var(--err-soft); padding: 2px 7px; border-radius: 999px; border: 1px solid var(--err-line); }
  .ts-row2 { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .ts-row2 .impacted-pill { display: inline-block; background: var(--surface-2); border: 1px solid var(--line); padding: 1px 6px; border-radius: 4px; margin-right: 4px; margin-top: 2px; color: var(--text-2); font-size: 10px; font-weight: 600; }
  .ts-empty { padding: 30px 16px; text-align: center; color: var(--ok); font-size: 12px; font-weight: 600; }

  .loading { text-align: center; padding: 80px 20px; color: var(--faint); font-size: 13px; }
  .loading .spinner { display: inline-block; width: 26px; height: 26px; border: 2px solid var(--line-2); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
  .footer { margin-top: 22px; text-align: center; font-size: 10px; color: var(--faint); }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <h1><span class="dot"></span>QA Downtime Dashboard</h1>
    <div class="right">
      <div class="last-fetched">Last fetched: <span class="v" id="lastFetched">…</span></div>
      <div class="pills">
        <button class="pill" data-days="7">7d</button>
        <button class="pill active" data-days="30">30d</button>
        <button class="pill" data-days="60">60d</button>
        <button class="pill" data-days="90">90d</button>
      </div>
      <button class="refresh" id="refreshBtn"><span class="arrow">↻</span> Refresh</button>
    </div>
  </header>

  <div class="stats" id="statsBar"></div>

  <div class="twocol">
    <div>
      <div class="card" id="calCard">
        <div class="loading"><div class="spinner"></div>Loading…</div>
      </div>
      <div id="detailHost"></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="t">Downtime Days</span></div>
      <div class="ts-list" id="downtimeList"></div>
    </div>
  </div>

  <div class="footer">Click any day to see exactly which projects went down and what failed</div>
</div>

<script>
const PROJECTS = [
  { name: "Asksam Automation",       short: "Asksam",       dashboard: "https://saira-uwc.github.io/asksam-automation-new/",                              runs: "https://saira-uwc.github.io/asksam-automation-new/history/runs.json", format: "playwright" },
  { name: "Website Automation",      short: "Website",      dashboard: "https://saira-uwc.github.io/Shunyalabs_website/",                                 runs: "https://saira-uwc.github.io/Shunyalabs_website/history/runs.json",     format: "playwright" },
  { name: "Widget Automation",       short: "Widget",       dashboard: "https://saira-uwc.github.io/Shunyalabs_widget/",                                  runs: "https://saira-uwc.github.io/Shunyalabs_widget/history/runs.json",      format: "playwright" },
  { name: "Console Dashboard",       short: "Console",      dashboard: "https://saira-uwc.github.io/Shunyalabs_console/",                                 runs: "https://saira-uwc.github.io/Shunyalabs_console/history/runs.json",     format: "playwright" },
  { name: "Vak BE Automation",       short: "Vak BE",       dashboard: "https://saira-uwc.github.io/Vak_automation/",                                     runs: "https://saira-uwc.github.io/Vak_automation/data.json",                 format: "vak" },
  { name: "Concurrent (Zero Indic)", short: "Concurrent",   dashboard: "https://yamini-pal-singh.github.io/automation-testing/Concurrent-Report.html",   runs: "https://yamini-pal-singh.github.io/automation-testing/concurrent-runs.json", format: "playwright" },
  { name: "Long Audio (Zero Indic)", short: "Long Audio",   dashboard: "https://yamini-pal-singh.github.io/automation-testing/Long-Audio-Report.html",   runs: "https://yamini-pal-singh.github.io/automation-testing/long-audio-runs.json", format: "playwright" },
  { name: "Playground",              short: "Playground",   dashboard: "https://yamini-pal-singh.github.io/playground-testing/Playground-Report.html",   runs: "https://yamini-pal-singh.github.io/playground-testing/playground-runs.json", format: "playwright" },
];

const IST_OFFSET_MS = 5.5 * 3600 * 1000;
const PREVIEW_FAILS = 3;
let currentWindow = 30;
let cache = null;
let activeDayKey = null;

function parseToDate(ts) {
  if (!ts) return null;
  if (/Z$/.test(ts)) { const d = new Date(ts); return isNaN(d) ? null : d; }
  if (/\bIST\b/.test(ts)) {
    const m = ts.replace(/\s*IST\s*$/, "").match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
    if (!m) return null;
    return new Date(Date.UTC(+m[1], +m[2] - 1, +m[3], +m[4], +m[5], +m[6]) - IST_OFFSET_MS);
  }
  const m1 = ts.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4}),\s*(\d{1,2}):(\d{2}):(\d{2})\s*(AM|PM)/i);
  if (m1) {
    let [, M, D, Y, h, mn, s, ap] = m1;
    h = +h;
    if (ap.toUpperCase() === "PM" && h < 12) h += 12;
    if (ap.toUpperCase() === "AM" && h === 12) h = 0;
    return new Date(Date.UTC(+Y, +M - 1, +D, h, +mn, +s) - IST_OFFSET_MS);
  }
  const m2 = ts.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
  if (m2) return new Date(Date.UTC(+m2[1], +m2[2] - 1, +m2[3], +m2[4], +m2[5], +m2[6]) - IST_OFFSET_MS);
  const m3 = ts.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m3) return new Date(Date.UTC(+m3[1], +m3[2] - 1, +m3[3], 0, 0, 0) - IST_OFFSET_MS);
  const d = new Date(ts);
  return isNaN(d) ? null : d;
}
function dateKeyIST(date) { return new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Kolkata", year: "numeric", month: "2-digit", day: "2-digit" }).format(date); }
function fmtFullDate(date) { return date.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata", weekday: "long", day: "numeric", month: "short", year: "numeric" }); }
function fmtShortDate(date) { return date.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata", weekday: "short", day: "numeric", month: "short" }); }
function fmtTime(date) { return date.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata", hour: "2-digit", minute: "2-digit", hour12: true }); }
function todayKey() { return dateKeyIST(new Date()); }
function dateFromKey(k) { return new Date(k + "T00:00:00+05:30"); }
function relativeDay(key) {
  const t = todayKey();
  if (key === t) return { label: "Today", strong: true };
  const yest = dateKeyIST(new Date(Date.now() - 86400000));
  if (key === yest) return { label: "Yesterday", strong: true };
  const target = dateFromKey(key);
  const days = Math.round((Date.now() - target.getTime()) / 86400000);
  if (days >= 2 && days <= 7) return { label: days + "d ago", strong: false };
  return null;
}

function normalize(raw, fmt) {
  const out = [];
  if (fmt === "vak") {
    for (const r of raw.runs || []) {
      out.push({ timestamp: r.timestamp, total: r.total || 0, passed: r.passed || 0, failed: r.failed || 0, passRate: r.pass_rate || 0, avgLatency: r.avg_latency, failedItems: [] });
    }
    return out;
  }
  for (const r of raw) {
    const summary = r.summary || {};
    const ts = r.startedAt || r.runTimestamp || r.runDate;
    const total = summary.total ?? r.total ?? 0;
    const passed = summary.passed ?? r.passed ?? 0;
    const failed = summary.failed ?? r.failed ?? 0;
    const passRate = r.passRate ?? 0;
    const failedItems = [];
    if (Array.isArray(r.tests)) {
      for (const t of r.tests) {
        const status = (t.status || "").toLowerCase();
        if (status === "failed" || status === "fail") {
          failedItems.push({ title: t.title || t.testPoint || t.name || "(unnamed)", module: t.moduleLabel || t.module || t.moduleName || "", error: (t.error || t.comment || "").split("\n")[0].slice(0, 220) });
        }
      }
    }
    if (failedItems.length === 0 && Array.isArray(r.suites)) {
      for (const s of r.suites) {
        const status = (s.status || "").toLowerCase();
        if (status === "fail" || status === "failed") {
          failedItems.push({ title: s.name || "(unnamed suite)", module: s.category || "", error: s.failure_reason || "" });
        }
      }
    }
    out.push({ timestamp: ts, total, passed, failed, passRate, timeSavedPercent: r.timeSavedPercent, avgLatencyMs: r.avgLatencyMs, failedItems });
  }
  return out;
}

async function fetchAll() {
  return Promise.all(PROJECTS.map(async (p, idx) => {
    try {
      const resp = await fetch(p.runs, { cache: "no-cache" });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const raw = await resp.json();
      const runs = normalize(raw, p.format).map((r) => ({ ...r, _date: parseToDate(r.timestamp) })).filter((r) => r._date);
      runs.sort((a, b) => b._date - a._date);
      return { idx, project: p, runs, error: null };
    } catch (e) {
      return { idx, project: p, runs: [], error: String(e.message || e) };
    }
  }));
}

// Build day index: { dateKey -> { byProj: Map<idx, runs[]>, total, failedRuns, projectsWithFailures, severity } }
function buildDayIndex(cutoff) {
  const days = new Map();
  for (const entry of cache) {
    if (entry.error) continue;
    for (const r of entry.runs) {
      if (cutoff && r._date.getTime() < cutoff) continue;
      const k = dateKeyIST(r._date);
      if (!days.has(k)) days.set(k, { byProj: new Map(), total: 0, failedRuns: 0, failedTests: 0, projectsWithFailures: new Set(), projectsWithRuns: new Set() });
      const day = days.get(k);
      if (!day.byProj.has(entry.idx)) day.byProj.set(entry.idx, []);
      day.byProj.get(entry.idx).push(r);
      day.total++;
      day.projectsWithRuns.add(entry.idx);
      if (r.failed > 0) {
        day.failedRuns++;
        day.failedTests += r.failed;
        day.projectsWithFailures.add(entry.idx);
      }
    }
  }
  for (const [, d] of days) {
    if (d.failedRuns === 0) d.severity = "ok";
    else if (d.failedRuns / d.total >= 0.5) d.severity = "danger";
    else d.severity = "warn";
  }
  return days;
}

function buildCalendar(dayIndex, days) {
  // Collect last N days. Calendar shows from the Monday of the oldest week to today.
  const cells = [];
  const todayKeyStr = todayKey();
  const todayDate = new Date(todayKeyStr + "T12:00:00+05:30"); // safe noon IST
  const oldest = new Date(todayDate.getTime() - (days - 1) * 86400000);
  // Find Monday-of-week containing oldest day. (Use IST)
  const dowOldest = parseInt(new Intl.DateTimeFormat("en-IN", { timeZone: "Asia/Kolkata", weekday: "short" }).format(oldest) === "Sun" ? 6 : 0); // not used directly
  // Instead, compute IST day-of-week using date string trick
  function istDow(date) {
    const wk = new Intl.DateTimeFormat("en-US", { timeZone: "Asia/Kolkata", weekday: "short" }).format(date);
    return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].indexOf(wk);
  }
  // We want grid starting on Monday. Pad before oldest to align.
  const oldestDow = istDow(oldest); // 0=Sun..6=Sat
  const padBefore = (oldestDow + 6) % 7; // Monday=0
  // Pad after today to fill week
  const todayDow = istDow(todayDate);
  const padAfter = 6 - ((todayDow + 6) % 7);
  // Build cell list
  const start = new Date(oldest.getTime() - padBefore * 86400000);
  const end = new Date(todayDate.getTime() + padAfter * 86400000);
  const totalCells = Math.round((end - start) / 86400000) + 1;
  for (let i = 0; i < totalCells; i++) {
    const d = new Date(start.getTime() + i * 86400000);
    const key = dateKeyIST(d);
    const inWindow = d >= oldest && d <= todayDate;
    cells.push({ key, date: d, inWindow });
  }
  return cells;
}

function severity(failedRuns, totalRuns) {
  if (totalRuns === 0) return "norun";
  if (failedRuns === 0) return "ok";
  return failedRuns / totalRuns >= 0.5 ? "danger" : "warn";
}

function render() {
  if (!cache) return;
  const cutoff = currentWindow > 0 ? Date.now() - currentWindow * 86400000 : 0;
  const dayIndex = buildDayIndex(cutoff);

  // Stats
  let totalFailedRuns = 0, totalFailedTests = 0;
  const projectsWithFailures = new Set();
  const downtimeDays = new Set();
  for (const [k, d] of dayIndex) {
    totalFailedRuns += d.failedRuns;
    totalFailedTests += d.failedTests;
    for (const p of d.projectsWithFailures) projectsWithFailures.add(p);
    if (d.failedRuns > 0) downtimeDays.add(k);
  }

  document.getElementById("statsBar").innerHTML = `
    <div class="stat brand"><span class="ic"></span><div class="text"><span class="l">Window</span><span class="v">${currentWindow}d</span></div></div>
    <div class="stat ${downtimeDays.size > 0 ? "danger" : "ok"}"><span class="ic"></span><div class="text"><span class="l">Downtime days</span><span class="v">${downtimeDays.size}</span></div></div>
    <div class="stat ${totalFailedRuns > 0 ? "danger" : "ok"}"><span class="ic"></span><div class="text"><span class="l">Failed runs</span><span class="v">${totalFailedRuns}</span></div></div>
    <div class="stat ${projectsWithFailures.size > 0 ? "danger" : "ok"}"><span class="ic"></span><div class="text"><span class="l">Projects affected</span><span class="v">${projectsWithFailures.size}<span class="of">/${PROJECTS.length}</span></span></div></div>
  `;

  // Build calendar
  const cells = buildCalendar(dayIndex, currentWindow);
  const todayKeyStr = todayKey();

  const dowHtml = ["MON","TUE","WED","THU","FRI","SAT","SUN"].map((d) => `<div class="d">${d}</div>`).join("");

  const cellsHtml = cells.map((c) => {
    if (!c.inWindow) return `<div class="cal-day empty"></div>`;
    const day = dayIndex.get(c.key);
    let sev = "norun";
    let metaText = "no run";
    let dotsHtml = "";
    if (day) {
      sev = severity(day.failedRuns, day.total);
      if (sev === "ok") metaText = `${day.total} run${day.total === 1 ? "" : "s"} · all pass`;
      else metaText = `<strong>${day.failedRuns}</strong> of ${day.total} failed · ${day.projectsWithFailures.size}p`;
      // Compute project status dots (in PROJECTS order). Show only projects with runs that day.
      const dots = PROJECTS.map((_p, idx) => {
        const runs = day.byProj.get(idx);
        if (!runs) return `<div class="proj-dot" title="${esc(_p.short)}: no run"></div>`;
        const failedCount = runs.filter((r) => r.failed > 0).length;
        const cls = failedCount === 0 ? "ok" : (failedCount === runs.length ? "fail" : "warn");
        return `<div class="proj-dot ${cls}" title="${esc(_p.short)}: ${failedCount}/${runs.length} failed"></div>`;
      }).join("");
      dotsHtml = `<div class="proj-dots">${dots}</div>`;
    }
    const date = dateFromKey(c.key);
    const dayNum = date.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata", day: "numeric" });
    const monAbbr = date.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata", month: "short" });
    const isToday = c.key === todayKeyStr;
    const isActive = c.key === activeDayKey;
    return `
      <div class="cal-day sev-${sev}${isToday ? " is-today" : ""}${isActive ? " is-active" : ""}" data-key="${esc(c.key)}">
        <div class="date"><span class="num">${esc(dayNum)}</span><span class="mo">${esc(monAbbr)}</span></div>
        ${dotsHtml}
        <div class="meta">${metaText}</div>
      </div>`;
  }).join("");

  document.getElementById("calCard").innerHTML = `
    <div class="card-head">
      <span class="t">Downtime Calendar <span class="sub">last ${currentWindow} days · IST</span></span>
      <span class="legend">
        <span class="lg"><span class="sw" style="background:linear-gradient(180deg,rgba(16,185,129,0.4),rgba(16,185,129,0.1));border:1px solid rgba(16,185,129,0.32);"></span> All pass</span>
        <span class="lg"><span class="sw" style="background:linear-gradient(180deg,rgba(245,158,11,0.4),rgba(245,158,11,0.12));border:1px solid rgba(245,158,11,0.4);"></span> Some failed</span>
        <span class="lg"><span class="sw" style="background:linear-gradient(180deg,rgba(239,68,68,0.4),rgba(239,68,68,0.16));border:1px solid rgba(239,68,68,0.42);"></span> Mostly failed</span>
        <span class="lg"><span class="sw" style="background:#1c2640;border:1px dashed var(--line);"></span> No run</span>
      </span>
    </div>
    <div class="cal">
      <div class="cal-dow">${dowHtml}</div>
      <div class="cal-grid">${cellsHtml}</div>
    </div>`;

  // Sidebar: downtime days
  const dKeys = [...dayIndex.keys()].filter((k) => dayIndex.get(k).failedRuns > 0).sort().reverse();
  if (dKeys.length === 0) {
    document.getElementById("downtimeList").innerHTML = `<div class="ts-empty">🎉 No downtime days in this window.</div>`;
  } else {
    document.getElementById("downtimeList").innerHTML = dKeys.map((k) => {
      const day = dayIndex.get(k);
      const rel = relativeDay(k);
      const date = dateFromKey(k);
      const projsAffected = [...day.projectsWithFailures].map((idx) => PROJECTS[idx].short);
      const isActive = k === activeDayKey ? " is-active" : "";
      return `
        <div class="ts-item${isActive}" data-key="${esc(k)}">
          <div class="ts-row1">
            <span class="ts-date">${esc(fmtShortDate(date))}</span>
            ${rel ? `<span class="ts-rel ${rel.strong ? "" : "faint"}">${esc(rel.label)}</span>` : ""}
            <span class="ts-count">${day.failedRuns} fail${day.failedRuns === 1 ? "" : "s"}</span>
          </div>
          <div class="ts-row2">${projsAffected.map((n) => `<span class="impacted-pill">${esc(n)}</span>`).join("")}</div>
        </div>`;
    }).join("");
  }

  // Default active day: most recent downtime day, if any and none chosen
  if (activeDayKey == null && dKeys.length > 0) activeDayKey = dKeys[0];

  renderDayDetail(dayIndex);
  bindHandlers(dayIndex);
}

function renderDayDetail(dayIndex) {
  const host = document.getElementById("detailHost");
  if (activeDayKey == null) { host.innerHTML = ""; return; }
  const day = dayIndex.get(activeDayKey);
  const date = dateFromKey(activeDayKey);
  const rel = relativeDay(activeDayKey);

  if (!day || day.failedRuns === 0) {
    const ranAny = day && day.total > 0;
    host.innerHTML = `
      <div class="detail-card">
        <div class="detail-head">
          <span class="nm">${esc(fmtFullDate(date))}</span>
          ${rel ? `<span class="rel">${esc(rel.label)}</span>` : ""}
          <span class="summary ok">${ranAny ? `All ${day.total} run${day.total === 1 ? "" : "s"} passed ✓` : "No runs that day"}</span>
          <button class="close" data-action="close-detail" title="Close">×</button>
        </div>
      </div>`;
    bindDetail();
    return;
  }

  // Group failed runs by project
  const projHtml = PROJECTS.map((p, idx) => {
    const runs = day.byProj.get(idx);
    if (!runs) return "";
    const failed = runs.filter((r) => r.failed > 0);
    if (failed.length === 0) return "";
    const failedTests = failed.reduce((s, r) => s + r.failed, 0);
    const allRunsFailed = failed.length === runs.length;
    return `
      <div class="imp-proj">
        <div class="imp-head">
          <div class="imp-name"><span class="stat-dot ${allRunsFailed ? "danger" : "warn"}"></span>${esc(p.name)}</div>
          <span class="imp-summary"><strong>${failed.length}</strong> of ${runs.length} run${runs.length === 1 ? "" : "s"} failed · ${failedTests} test${failedTests === 1 ? "" : "s"}</span>
          <a class="imp-link" href="${esc(p.dashboard)}" target="_blank" rel="noopener">↗ dashboard</a>
        </div>
        ${failed.map(renderRun).join("")}
      </div>`;
  }).join("");

  host.innerHTML = `
    <div class="detail-card">
      <div class="detail-head">
        <span class="nm">${esc(fmtFullDate(date))}</span>
        ${rel ? `<span class="rel">${esc(rel.label)}</span>` : ""}
        <span class="summary"><strong>${day.failedRuns}</strong> of ${day.total} runs failed · ${day.projectsWithFailures.size} project${day.projectsWithFailures.size === 1 ? "" : "s"} affected</span>
        <button class="close" data-action="close-detail" title="Close">×</button>
      </div>
      <div class="impacted">${projHtml}</div>
    </div>`;
  bindDetail();
}

function renderRun(r) {
  const time = fmtTime(r._date);
  let extra = "";
  if (r.avgLatencyMs != null) extra = `avg latency ${(r.avgLatencyMs / 1000).toFixed(1)}s`;
  else if (r.timeSavedPercent != null) extra = `time saved ${r.timeSavedPercent}%`;
  else if (r.avgLatency != null) extra = `avg latency ${(r.avgLatency / 1000).toFixed(1)}s`;

  let preview = "";
  if (r.failedItems && r.failedItems.length) {
    const visible = r.failedItems.slice(0, PREVIEW_FAILS);
    const hidden = r.failedItems.slice(PREVIEW_FAILS);
    const item = (f, hide) => `<li${hide ? ' class="hidden-fail" style="display:none;"' : ""}>
      <div><span class="ftitle">${esc(f.title)}</span>${f.module ? ` <span class="fmod">${esc(f.module)}</span>` : ""}</div>
      ${f.error ? `<div class="ferr">${esc(f.error)}</div>` : ""}
    </li>`;
    const visibleHtml = visible.map((f) => item(f, false)).join("");
    const hiddenHtml = hidden.map((f) => item(f, true)).join("");
    const more = hidden.length ? `<div class="fails-more" data-action="toggle-more">▾ Show ${hidden.length} more</div>` : "";
    preview = `<div class="fails-preview"><ul>${visibleHtml}${hiddenHtml}</ul>${more}</div>`;
  }
  return `
    <div class="run">
      <div class="run-head">
        <span class="run-time">${esc(time)}</span>
        <span class="run-counts"><span class="x">${r.failed}</span><span class="of"> / ${r.total}</span> failed</span>
        <span class="run-pass">${r.passRate}% pass</span>
        ${extra ? `<span class="run-extra">${esc(extra)}</span>` : ""}
      </div>
      ${preview}
    </div>`;
}

function bindHandlers(dayIndex) {
  document.querySelectorAll(".cal-day:not(.empty)").forEach((c) => {
    c.addEventListener("click", () => {
      const k = c.getAttribute("data-key");
      activeDayKey = activeDayKey === k ? null : k;
      render();
      if (activeDayKey) setTimeout(() => document.getElementById("detailHost").scrollIntoView({ behavior: "smooth", block: "start" }), 50);
    });
  });
  document.querySelectorAll(".ts-item").forEach((it) => {
    it.addEventListener("click", () => {
      const k = it.getAttribute("data-key");
      activeDayKey = k;
      render();
      setTimeout(() => document.getElementById("detailHost").scrollIntoView({ behavior: "smooth", block: "start" }), 50);
    });
  });
}

function bindDetail() {
  document.querySelectorAll('[data-action="close-detail"]').forEach((b) => {
    b.addEventListener("click", () => { activeDayKey = null; render(); });
  });
  document.querySelectorAll('[data-action="toggle-more"]').forEach((b) => {
    b.addEventListener("click", () => {
      const ul = b.parentElement.querySelector("ul");
      const hidden = ul.querySelectorAll(".hidden-fail");
      const isShown = hidden.length && hidden[0].style.display !== "none";
      hidden.forEach((li) => { li.style.display = isShown ? "none" : "block"; });
      b.textContent = isShown ? `▾ Show ${hidden.length} more` : `▴ Hide`;
    });
  });
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function load() {
  const refreshBtn = document.getElementById("refreshBtn");
  refreshBtn.classList.add("spinning");
  document.getElementById("calCard").innerHTML = '<div class="loading"><div class="spinner"></div>Loading project feeds…</div>';
  document.getElementById("lastFetched").textContent = "…";
  cache = await fetchAll();
  document.getElementById("lastFetched").textContent = new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit", hour12: true }) + " IST";
  render();
  setTimeout(() => refreshBtn.classList.remove("spinning"), 400);
}

document.querySelectorAll(".pill").forEach((p) => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".pill").forEach((x) => x.classList.remove("active"));
    p.classList.add("active");
    currentWindow = +p.getAttribute("data-days");
    activeDayKey = null;
    render();
  });
});
document.getElementById("refreshBtn").addEventListener("click", load);
load();
</script>
</body>

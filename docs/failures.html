<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Downtime Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0c0d14;
    --bg-secondary: #141522;
    --bg-card: #1a1b2a;
    --bg-card-hover: #1f2037;
    --border: #26283a;
    --border-strong: #353851;
    --text-primary: #f8fafc;
    --text-muted: #9ca3af;
    --text-dimmed: #6b7280;
    --accent: #8b5cf6;
    --accent-soft: rgba(139, 92, 246, 0.18);
    --accent-line: rgba(139, 92, 246, 0.4);
    --green: #22c55e;
    --green-soft: rgba(34, 197, 94, 0.13);
    --green-line: rgba(34, 197, 94, 0.32);
    --red: #ef4444;
    --red-soft: rgba(239, 68, 68, 0.12);
    --red-line: rgba(239, 68, 68, 0.32);
    --amber: #f59e0b;
    --amber-soft: rgba(245, 158, 11, 0.12);
    --amber-line: rgba(245, 158, 11, 0.32);
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 6px 20px rgba(0,0,0,.30);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', system-ui, Arial, sans-serif;
    background: radial-gradient(ellipse at 20% 0%, #1a1830 0%, #0c0d14 50%, #090a10 100%);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* === Header === */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(12, 13, 20, 0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 28px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 18px; color: #fff;
  }
  .header h1 { font-size: 17px; font-weight: 700; line-height: 1.2; }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .last-run { font-size: 12px; color: var(--text-muted); background: var(--bg-card); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border); }
  .last-run strong { color: var(--text-primary); font-weight: 600; }
  .pills { display: flex; gap: 4px; background: var(--bg-card); border: 1px solid var(--border); padding: 3px; border-radius: 20px; }
  .pill-btn { background: transparent; border: 0; color: var(--text-muted); padding: 5px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; font-family: inherit; }
  .pill-btn:hover { color: var(--text-primary); }
  .pill-btn.active { background: var(--accent-soft); color: var(--accent); }
  .btn-refresh { background: var(--accent); color: #fff; border: none; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity .2s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-refresh:hover { opacity: 0.9; }
  .btn-refresh .arrow { display: inline-block; transition: transform .4s; }
  .btn-refresh.spinning .arrow { animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === Main === */
  .main { padding: 22px 28px 60px; max-width: 1240px; margin: 0 auto; }

  /* === Compact stats row === */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); transition: border-color .2s; display: flex; align-items: center; gap: 14px; }
  .stat-card:hover { border-color: var(--border-strong); }
  .stat-ic { width: 10px; height: 10px; border-radius: 50%; background: var(--text-dimmed); flex-shrink: 0; }
  .stat-ic.danger { background: var(--red); box-shadow: 0 0 8px var(--red); }
  .stat-ic.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .stat-ic.accent { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .stat-text { display: flex; flex-direction: column; min-width: 0; flex: 1; }
  .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); }
  .stat-value { font-size: 24px; font-weight: 700; line-height: 1.1; margin-top: 2px; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .stat-value .of { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-left: 3px; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.accent { color: var(--accent); }
  .stat-sub { font-size: 11px; color: var(--text-dimmed); margin-top: 2px; }
  @media (max-width: 760px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

  /* === Healthy strip === */
  .healthy { background: var(--bg-card); border: 1px solid var(--green-line); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .healthy-label { font-size: 11px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .6px; }
  .healthy-pill { background: var(--green-soft); color: var(--green); padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .healthy-pill::before { content: "✓"; font-weight: 700; }
  .healthy-pill .num { color: var(--text-muted); font-weight: 500; font-size: 11px; }

  /* === Section title === */
  .section-title { font-size: 15px; font-weight: 700; margin: 22px 0 12px; display: flex; align-items: center; gap: 10px; }
  .section-title::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }
  .section-title .count { color: var(--text-muted); font-weight: 500; font-size: 13px; margin-left: 4px; }

  /* === Project card === */
  .proj { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow); transition: border-color .2s; }
  .proj.danger { border-color: rgba(239, 68, 68, 0.18); }
  .proj.warn { border-color: rgba(245, 158, 11, 0.16); }

  .proj-head { padding: 14px 18px; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); background: var(--bg-secondary); }
  .proj-num { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Fira Code', monospace; font-size: 18px; font-weight: 700; }
  .proj-num.danger { background: var(--red-soft); color: var(--red); border: 1px solid var(--red-line); }
  .proj-num.warn { background: var(--amber-soft); color: var(--amber); border: 1px solid var(--amber-line); }
  .proj-num.error { background: var(--bg-card); color: var(--text-muted); border: 1px solid var(--border); }
  .proj-info { min-width: 0; }
  .proj-name { font-size: 16px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; line-height: 1.2; }
  .proj-name .dlink { font-size: 11px; font-weight: 600; color: var(--accent); text-decoration: none; padding: 3px 8px; border-radius: 5px; background: var(--accent-soft); transition: opacity .15s; }
  .proj-name .dlink:hover { opacity: 0.85; }
  .proj-summary { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
  .proj-summary .num { color: var(--text-primary); font-weight: 700; }
  .proj-summary .num.red { color: var(--red); }
  .every-fail-tag { color: var(--red); font-weight: 700; padding: 1px 7px; background: var(--red-soft); border: 1px solid var(--red-line); border-radius: 5px; font-size: 10px; margin-left: 6px; text-transform: uppercase; letter-spacing: .3px; }

  /* Strip in header (compact, right-aligned) */
  .strip-block { min-width: 160px; max-width: 260px; }
  .strip-axis-top { font-size: 9px; font-weight: 700; color: var(--text-dimmed); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; text-align: right; }
  .strip { display: flex; gap: 2px; align-items: stretch; }
  .strip-cell { flex: 1; min-width: 5px; height: 16px; border-radius: 2px; background: var(--border); transition: transform .12s; }
  .strip-cell.has-run.all-pass { background: var(--green); }
  .strip-cell.has-run.some-fail { background: var(--amber); }
  .strip-cell.has-run.all-fail { background: var(--red); }
  .strip-cell.is-today { box-shadow: 0 0 0 1.5px var(--accent); z-index: 1; }
  .strip-cell:hover { transform: scaleY(1.4); }
  .strip-axis { display: flex; justify-content: space-between; padding-top: 4px; font-size: 9px; color: var(--text-dimmed); font-weight: 500; }

  @media (max-width: 720px) {
    .proj-head { grid-template-columns: auto 1fr; }
    .strip-block { grid-column: 1 / -1; max-width: none; }
    .strip-axis-top { text-align: left; }
  }

  /* === Day table === */
  .proj-body { padding: 4px 0 8px; }
  .day-row { display: grid; grid-template-columns: 220px 1fr auto; align-items: start; gap: 14px; padding: 12px 18px; border-top: 1px solid var(--border); }
  .day-row:first-child { border-top: 0; }
  .day-row:hover { background: rgba(255,255,255,0.012); }

  .dr-date { display: flex; align-items: center; gap: 9px; padding-top: 7px; min-width: 0; }
  .dr-bullet { width: 8px; height: 8px; border-radius: 50%; background: var(--red); box-shadow: 0 0 7px var(--red); flex-shrink: 0; }
  .dr-date-text { display: flex; flex-direction: column; min-width: 0; }
  .dr-day-name { font-size: 13px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.01em; }
  .dr-day-rel {
    font-size: 9px; font-weight: 700; color: var(--accent);
    background: var(--accent-soft); padding: 2px 7px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: .5px;
    margin-top: 4px; align-self: flex-start;
  }
  .dr-day-rel.faint { color: var(--text-muted); background: var(--bg-card-hover); }

  .dr-times { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 4px; min-width: 0; }
  .time-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--bg-secondary); border: 1px solid var(--border);
    color: var(--text-primary); padding: 6px 11px;
    border-radius: 7px; cursor: pointer; transition: all .15s; user-select: none;
    line-height: 1;
  }
  .time-pill:hover { border-color: var(--accent); }
  .time-pill.is-open { border-color: var(--accent); background: var(--bg-card-hover); }
  .time-pill .t-time { font-family: 'Fira Code', monospace; font-weight: 600; color: var(--red); font-size: 11px; }
  .time-pill .t-counts { font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .time-pill .t-counts strong { color: var(--red); font-weight: 700; }
  .time-pill .t-chevron { color: var(--text-dimmed); font-size: 9px; transition: transform .15s; }
  .time-pill.is-open .t-chevron { transform: rotate(90deg); color: var(--accent); }

  .dr-counts { padding-top: 7px; text-align: right; min-width: 110px; }
  .dr-counts .badge { display: inline-block; font-size: 11px; color: var(--red); font-weight: 700; background: var(--red-soft); padding: 3px 9px; border-radius: 999px; border: 1px solid var(--red-line); white-space: nowrap; }
  .dr-counts .sub { font-size: 10px; color: var(--text-dimmed); margin-top: 4px; font-weight: 500; white-space: nowrap; }

  /* Inline run detail row */
  .day-detail { padding: 0 18px 14px 252px; }
  .run-detail { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 8px; }
  .run-detail-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; font-size: 12px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .run-detail-row .label { font-size: 10px; font-weight: 700; color: var(--text-dimmed); letter-spacing: .5px; text-transform: uppercase; }
  .run-detail-row .pass-rate { font-family: 'Fira Code', monospace; color: var(--text-muted); font-size: 11px; }
  .run-detail-row .extra-chip { font-size: 11px; padding: 3px 9px; border-radius: 12px; background: var(--accent-soft); color: var(--accent); font-family: 'Fira Code', monospace; }
  .fails-list { margin: 0; padding: 0; list-style: none; }
  .fails-list li { padding: 7px 0; border-top: 1px dashed var(--border); }
  .fails-list li:first-child { border-top: 0; padding-top: 0; }
  .ftitle { color: var(--text-primary); font-weight: 600; font-size: 12.5px; line-height: 1.45; }
  .fmod { color: var(--accent); font-size: 10px; margin-left: 7px; padding: 1px 7px; background: var(--accent-soft); border-radius: 5px; font-weight: 600; letter-spacing: .2px; vertical-align: 1px; }
  .ferr { color: var(--text-muted); font-size: 11px; margin-top: 3px; word-break: break-word; line-height: 1.45; font-family: 'Fira Code', monospace; max-height: 38px; overflow: hidden; }
  .fno-detail { color: var(--text-dimmed); font-style: italic; font-size: 11.5px; padding: 4px 0; }
  @media (max-width: 720px) {
    .day-row { grid-template-columns: 1fr; gap: 8px; }
    .day-detail { padding: 0 18px 14px; }
    .dr-counts { text-align: left; }
  }

  .show-more { padding: 12px 18px 16px; text-align: center; border-top: 1px solid var(--border); }
  .show-more button { background: transparent; color: var(--accent); border: 1px solid var(--border); padding: 7px 16px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all .15s; }
  .show-more button:hover { border-color: var(--accent); background: var(--accent-soft); }

  .loading { display: flex; align-items: center; justify-content: center; min-height: 280px; flex-direction: column; gap: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  .empty-line { padding: 20px; text-align: center; color: var(--text-muted); font-size: 14px; }
  .empty-line.ok { color: var(--green); font-weight: 600; }

  .footer { margin-top: 30px; text-align: center; font-size: 11px; color: var(--text-dimmed); }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">⚠</div>
    <div>
      <h1>QA Downtime Tracker</h1>
      <div class="header-sub">Failed runs across all automation projects</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-run" id="lastRun">Loading...</span>
    <div class="pills">
      <button class="pill-btn" data-days="7">7d</button>
      <button class="pill-btn active" data-days="30">30d</button>
      <button class="pill-btn" data-days="60">60d</button>
      <button class="pill-btn" data-days="90">90d</button>
    </div>
    <button class="btn-refresh" id="refreshBtn"><span class="arrow">↻</span> Refresh</button>
  </div>
</div>

<div class="main">
  <div class="stats-grid" id="statsGrid"></div>
  <div id="content"><div class="loading"><div class="spinner"></div><span style="color:var(--text-muted);font-size:13px;">Loading project feeds...</span></div></div>
  <div class="footer">Click any time chip to see what tests failed in that run · <a href="./">Back to Vak Dashboard</a></div>
</div>

<script>
const PROJECTS = [
  { name: "Asksam Automation",       short: "Asksam",       dashboard: "https://saira-uwc.github.io/asksam-automation-new/",                              runs: "https://saira-uwc.github.io/asksam-automation-new/history/runs.json", format: "playwright" },
  { name: "Website Automation",      short: "Website",      dashboard: "https://saira-uwc.github.io/Shunyalabs_website/",                                 runs: "https://saira-uwc.github.io/Shunyalabs_website/history/runs.json",     format: "playwright" },
  { name: "Widget Automation",       short: "Widget",       dashboard: "https://saira-uwc.github.io/Shunyalabs_widget/",                                  runs: "https://saira-uwc.github.io/Shunyalabs_widget/history/runs.json",      format: "playwright" },
  { name: "Console Dashboard",       short: "Console",      dashboard: "https://saira-uwc.github.io/Shunyalabs_console/",                                 runs: "https://saira-uwc.github.io/Shunyalabs_console/history/runs.json",     format: "playwright" },
  { name: "Vak BE Automation",       short: "Vak BE",       dashboard: "https://saira-uwc.github.io/Vak_automation/",                                     runs: "https://saira-uwc.github.io/Vak_automation/data.json",                 format: "vak" },
  { name: "Concurrent (Zero Indic)", short: "Concurrent",   dashboard: "https://yamini-pal-singh.github.io/automation-testing/Concurrent-Report.html",   runs: "https://yamini-pal-singh.github.io/automation-testing/concurrent-runs.json", format: "playwright" },
  { name: "Long Audio (Zero Indic)", short: "Long Audio",   dashboard: "https://yamini-pal-singh.github.io/automation-testing/Long-Audio-Report.html",   runs: "https://yamini-pal-singh.github.io/automation-testing/long-audio-runs.json", format: "playwright" },
  { name: "Playground",              short: "Playground",   dashboard: "https://yamini-pal-singh.github.io/playground-testing/Playground-Report.html",   runs: "https://yamini-pal-singh.github.io/playground-testing/playground-runs.json", format: "playwright" },
];

const IST_OFFSET_MS = 5.5 * 3600 * 1000;
const DEFAULT_VISIBLE_DAYS = 5;
let currentWindow = 30;
let cache = null;
let expandedDays = {};
let openRuns = new Set();

function parseToDate(ts) {
  if (!ts) return null;
  if (/Z$/.test(ts)) { const d = new Date(ts); return isNaN(d) ? null : d; }
  if (/\bIST\b/.test(ts)) {
    const m = ts.replace(/\s*IST\s*$/, "").match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
    if (!m) return null;
    return new Date(Date.UTC(+m[1], +m[2] - 1, +m[3], +m[4], +m[5], +m[6]) - IST_OFFSET_MS);
  }
  const m1 = ts.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4}),\s*(\d{1,2}):(\d{2}):(\d{2})\s*(AM|PM)/i);
  if (m1) {
    let [, M, D, Y, h, mn, s, ap] = m1;
    h = +h;
    if (ap.toUpperCase() === "PM" && h < 12) h += 12;
    if (ap.toUpperCase() === "AM" && h === 12) h = 0;
    return new Date(Date.UTC(+Y, +M - 1, +D, h, +mn, +s) - IST_OFFSET_MS);
  }
  const m2 = ts.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
  if (m2) return new Date(Date.UTC(+m2[1], +m2[2] - 1, +m2[3], +m2[4], +m2[5], +m2[6]) - IST_OFFSET_MS);
  const m3 = ts.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m3) return new Date(Date.UTC(+m3[1], +m3[2] - 1, +m3[3], 0, 0, 0) - IST_OFFSET_MS);
  const d = new Date(ts);
  return isNaN(d) ? null : d;
}
function dateKeyIST(date) { return new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Kolkata", year: "numeric", month: "2-digit", day: "2-digit" }).format(date); }
function fmtShortDate(date) { return date.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata", weekday: "short", day: "2-digit", month: "short" }); }
function fmtTime(date) { return date.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata", hour: "2-digit", minute: "2-digit", hour12: true }); }
function todayKey() { return dateKeyIST(new Date()); }
function relativeDay(key) {
  const t = todayKey();
  if (key === t) return { label: "Today", strong: true };
  const yest = dateKeyIST(new Date(Date.now() - 86400000));
  if (key === yest) return { label: "Yesterday", strong: true };
  const target = new Date(key + "T00:00:00+05:30");
  const days = Math.round((Date.now() - target.getTime()) / 86400000);
  if (days >= 2 && days <= 14) return { label: days + "d ago", strong: false };
  return null;
}

function normalize(raw, fmt) {
  const out = [];
  if (fmt === "vak") {
    for (const r of raw.runs || []) {
      out.push({ timestamp: r.timestamp, total: r.total || 0, passed: r.passed || 0, failed: r.failed || 0, passRate: r.pass_rate || 0, avgLatency: r.avg_latency, failedItems: [] });
    }
    return out;
  }
  for (const r of raw) {
    const summary = r.summary || {};
    const ts = r.startedAt || r.runTimestamp || r.runDate;
    const total = summary.total ?? r.total ?? 0;
    const passed = summary.passed ?? r.passed ?? 0;
    const failed = summary.failed ?? r.failed ?? 0;
    const passRate = r.passRate ?? 0;
    const failedItems = [];
    if (Array.isArray(r.tests)) {
      for (const t of r.tests) {
        const status = (t.status || "").toLowerCase();
        if (status === "failed" || status === "fail") {
          failedItems.push({ title: t.title || t.testPoint || t.name || "(unnamed)", module: t.moduleLabel || t.module || t.moduleName || "", error: (t.error || t.comment || "").split("\n")[0].slice(0, 220) });
        }
      }
    }
    if (failedItems.length === 0 && Array.isArray(r.suites)) {
      for (const s of r.suites) {
        const status = (s.status || "").toLowerCase();
        if (status === "fail" || status === "failed") {
          failedItems.push({ title: s.name || "(unnamed suite)", module: s.category || "", error: s.failure_reason || "" });
        }
      }
    }
    out.push({ timestamp: ts, total, passed, failed, passRate, timeSavedPercent: r.timeSavedPercent, avgLatencyMs: r.avgLatencyMs, failedItems });
  }
  return out;
}

async function fetchAll() {
  return Promise.all(PROJECTS.map(async (p, idx) => {
    try {
      const resp = await fetch(p.runs, { cache: "no-cache" });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const raw = await resp.json();
      const runs = normalize(raw, p.format).map((r) => ({ ...r, _date: parseToDate(r.timestamp) })).filter((r) => r._date);
      runs.sort((a, b) => b._date - a._date);
      runs.forEach((r, i) => { r._id = i; });
      return { idx, project: p, runs, error: null };
    } catch (e) {
      return { idx, project: p, runs: [], error: String(e.message || e) };
    }
  }));
}

function buildStripCells(runsInWindow, days) {
  const today = todayKey();
  const cells = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    cells.push({ key: dateKeyIST(d), runs: [] });
  }
  const byKey = new Map(cells.map((c) => [c.key, c]));
  for (const r of runsInWindow) {
    const k = dateKeyIST(r._date);
    if (byKey.has(k)) byKey.get(k).runs.push(r);
  }
  return cells.map((c) => {
    let cls = "strip-cell";
    if (c.runs.length) {
      cls += " has-run";
      const failedCount = c.runs.filter((r) => r.failed > 0).length;
      if (failedCount === 0) cls += " all-pass";
      else if (failedCount === c.runs.length) cls += " all-fail";
      else cls += " some-fail";
    }
    if (c.key === today) cls += " is-today";
    const failedRuns = c.runs.filter((r) => r.failed > 0).length;
    const tip = c.runs.length === 0
      ? `${c.key} — no runs`
      : failedRuns === 0
        ? `${c.key} — ${c.runs.length} run${c.runs.length === 1 ? "" : "s"} all passed`
        : `${c.key} — ${failedRuns}/${c.runs.length} runs failed`;
    return { cls, tip, key: c.key };
  });
}

function severity(failedRuns, totalRuns) {
  if (totalRuns === 0) return "error";
  if (failedRuns === 0) return "ok";
  return failedRuns / totalRuns >= 0.5 ? "danger" : "warn";
}

function render() {
  if (!cache) return;
  const cutoff = currentWindow > 0 ? Date.now() - currentWindow * 86400000 : 0;
  const stripDays = Math.min(currentWindow, 30);
  let totalFailedRuns = 0, totalFailedTests = 0, projectsAffected = 0, healthy = [];
  const failingHtml = [];

  for (const entry of cache) {
    const { project, runs, error, idx } = entry;
    if (error) {
      failingHtml.push(`
        <div class="proj">
          <div class="proj-head">
            <div class="proj-num error">!</div>
            <div class="proj-info">
              <div class="proj-name">${esc(project.name)}</div>
              <div class="proj-summary">Could not load feed — <span style="font-family:'Fira Code',monospace;">${esc(error)}</span></div>
            </div>
            <div></div>
          </div>
        </div>`);
      continue;
    }

    const inWindow = runs.filter((r) => !cutoff || r._date.getTime() >= cutoff);
    const failedRuns = inWindow.filter((r) => r.failed > 0);
    const failedTestsCount = failedRuns.reduce((s, r) => s + r.failed, 0);

    if (failedRuns.length === 0) {
      healthy.push({ project, runs: inWindow.length });
      continue;
    }

    projectsAffected++;
    totalFailedRuns += failedRuns.length;
    totalFailedTests += failedTestsCount;

    // Group by IST date
    const byDate = new Map();
    for (const r of failedRuns) {
      const k = dateKeyIST(r._date);
      if (!byDate.has(k)) byDate.set(k, []);
      byDate.get(k).push(r);
    }
    const dateKeys = [...byDate.keys()].sort().reverse();

    const showAll = !!expandedDays[idx];
    const visibleDates = showAll ? dateKeys : dateKeys.slice(0, DEFAULT_VISIBLE_DAYS);
    const hiddenCount = dateKeys.length - visibleDates.length;

    const dayRowsHtml = visibleDates.map((k) => {
      const list = byDate.get(k);
      const rel = relativeDay(k);
      const totalFailedThisDay = list.reduce((s, r) => s + r.failed, 0);
      const date = list[0]._date;
      const timesHtml = list.map((r) => {
        const runKey = `${idx}-${r._id}`;
        const isOpen = openRuns.has(runKey);
        return `<span class="time-pill ${isOpen ? "is-open" : ""}" data-run="${esc(runKey)}">
          <span class="t-time">${esc(fmtTime(r._date))}</span>
          <span class="t-counts"><strong>${r.failed}</strong>/${r.total}</span>
          <span class="t-chevron">▸</span>
        </span>`;
      }).join("");

      const detailsHtml = list.filter((r) => openRuns.has(`${idx}-${r._id}`)).map((r) => `<div class="day-detail">${renderRunDetail(r)}</div>`).join("");

      return `
        <div class="day-row">
          <div class="dr-date">
            <span class="dr-bullet"></span>
            <div class="dr-date-text">
              <span class="dr-day-name">${esc(fmtShortDate(date))}</span>
              ${rel ? `<span class="dr-day-rel ${rel.strong ? "" : "faint"}">${esc(rel.label)}</span>` : ""}
            </div>
          </div>
          <div class="dr-times">${timesHtml}</div>
          <div class="dr-counts">
            <span class="badge">${list.length} fail${list.length === 1 ? "" : "s"}</span>
            <div class="sub">${totalFailedThisDay} test${totalFailedThisDay === 1 ? "" : "s"} broken</div>
          </div>
        </div>${detailsHtml}`;
    }).join("");

    const showMoreBtn = hiddenCount > 0
      ? `<div class="show-more"><button data-action="show-more" data-idx="${idx}">Show ${hiddenCount} more downtime day${hiddenCount === 1 ? "" : "s"}</button></div>`
      : (showAll && dateKeys.length > DEFAULT_VISIBLE_DAYS ? `<div class="show-more"><button data-action="show-more" data-idx="${idx}">Show fewer</button></div>` : "");

    const sev = severity(failedRuns.length, inWindow.length);
    const everyFailed = failedRuns.length === inWindow.length && inWindow.length > 1;
    const stripCells = buildStripCells(inWindow, stripDays);

    failingHtml.push(`
      <div class="proj ${sev}">
        <div class="proj-head">
          <div class="proj-num ${sev === "danger" ? "danger" : "warn"}">${dateKeys.length}</div>
          <div class="proj-info">
            <div class="proj-name">${esc(project.name)} <a class="dlink" href="${esc(project.dashboard)}" target="_blank" rel="noopener">↗ open dashboard</a></div>
            <div class="proj-summary">Down on <span class="num red">${dateKeys.length}</span> day${dateKeys.length === 1 ? "" : "s"} · <span class="num">${failedRuns.length}</span> of ${inWindow.length} run${inWindow.length === 1 ? "" : "s"} failed · <span class="num">${failedTestsCount}</span> test${failedTestsCount === 1 ? "" : "s"} broken${everyFailed ? `<span class="every-fail-tag">every run failed</span>` : ""}</div>
          </div>
          <div class="strip-block">
            <div class="strip-axis-top">Last ${stripDays}d · IST</div>
            <div class="strip">${stripCells.map((c) => `<div class="${c.cls}" title="${esc(c.tip)}"></div>`).join("")}</div>
            <div class="strip-axis"><span>${esc(stripCells[0].key)}</span><span>today</span></div>
          </div>
        </div>
        <div class="proj-body">
          ${dayRowsHtml}
        </div>
        ${showMoreBtn}
      </div>`);
  }

  // Stats
  document.getElementById("statsGrid").innerHTML = `
    <div class="stat-card">
      <span class="stat-ic accent"></span>
      <div class="stat-text">
        <div class="stat-label">Window</div>
        <div class="stat-value accent">${currentWindow}d</div>
        <div class="stat-sub">last ${currentWindow} days · IST</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-ic ${projectsAffected > 0 ? "danger" : "ok"}"></span>
      <div class="stat-text">
        <div class="stat-label">Projects with downtime</div>
        <div class="stat-value ${projectsAffected > 0 ? "red" : "green"}">${projectsAffected}<span class="of">/${PROJECTS.length}</span></div>
        <div class="stat-sub">${projectsAffected === 0 ? "all healthy" : "need attention"}</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-ic ${totalFailedRuns > 0 ? "danger" : "ok"}"></span>
      <div class="stat-text">
        <div class="stat-label">Failed runs</div>
        <div class="stat-value ${totalFailedRuns > 0 ? "red" : "green"}">${totalFailedRuns}</div>
        <div class="stat-sub">across all projects</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-ic ${totalFailedTests > 0 ? "danger" : "ok"}"></span>
      <div class="stat-text">
        <div class="stat-label">Failed tests</div>
        <div class="stat-value ${totalFailedTests > 0 ? "red" : "green"}">${totalFailedTests}</div>
        <div class="stat-sub">total individual failures</div>
      </div>
    </div>
  `;

  // Healthy strip
  let healthyHtml = "";
  if (healthy.length) {
    const items = healthy.map((h) => `<span class="healthy-pill">${esc(h.project.name)} <span class="num">${h.runs} run${h.runs === 1 ? "" : "s"}</span></span>`).join("");
    healthyHtml = `<div class="healthy"><span class="healthy-label">All passing · ${healthy.length}</span>${items}</div>`;
  }

  let header = "";
  if (failingHtml.length > 0) {
    header = `<div class="section-title">Projects with Downtime <span class="count">· ${projectsAffected} of ${PROJECTS.length}</span></div>`;
  }

  document.getElementById("content").innerHTML =
    healthyHtml +
    header +
    (failingHtml.length ? failingHtml.join("") : `<div class="proj"><div class="empty-line ok">🎉 No downtime in this window across any project.</div></div>`);

  bindHandlers();
}

function renderRunDetail(r) {
  let extra = "";
  if (r.avgLatencyMs != null) extra = `avg latency ${(r.avgLatencyMs / 1000).toFixed(1)}s`;
  else if (r.timeSavedPercent != null) extra = `time saved ${r.timeSavedPercent}%`;
  else if (r.avgLatency != null) extra = `avg latency ${(r.avgLatency / 1000).toFixed(1)}s`;

  let body;
  if (!r.failedItems || r.failedItems.length === 0) {
    body = `<div class="fno-detail">This feed doesn't expose per-test detail — ${r.failed} test${r.failed === 1 ? "" : "s"} failed in this run.</div>`;
  } else {
    body = `<ul class="fails-list">${r.failedItems.slice(0, 30).map((f) => `<li>
      <div><span class="ftitle">${esc(f.title)}</span>${f.module ? `<span class="fmod">${esc(f.module)}</span>` : ""}</div>
      ${f.error ? `<div class="ferr">${esc(f.error)}</div>` : ""}
    </li>`).join("")}${r.failedItems.length > 30 ? `<li class="fno-detail">+${r.failedItems.length - 30} more failed item${r.failedItems.length - 30 === 1 ? "" : "s"}…</li>` : ""}</ul>`;
  }

  return `
    <div class="run-detail">
      <div class="run-detail-row">
        <span class="label">Run @ ${esc(fmtTime(r._date))}</span>
        <span class="pass-rate">${r.passRate}% pass rate</span>
        ${extra ? `<span class="extra-chip">${esc(extra)}</span>` : ""}
      </div>
      ${body}
    </div>`;
}

function bindHandlers() {
  document.querySelectorAll(".time-pill").forEach((p) => {
    p.addEventListener("click", () => {
      const k = p.getAttribute("data-run");
      if (openRuns.has(k)) openRuns.delete(k); else openRuns.add(k);
      render();
    });
  });
  document.querySelectorAll('[data-action="show-more"]').forEach((b) => {
    b.addEventListener("click", () => {
      const idx = +b.getAttribute("data-idx");
      expandedDays[idx] = !expandedDays[idx];
      render();
    });
  });
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function load() {
  const refreshBtn = document.getElementById("refreshBtn");
  refreshBtn.classList.add("spinning");
  document.getElementById("content").innerHTML = '<div class="loading"><div class="spinner"></div><span style="color:var(--text-muted);font-size:13px;">Loading project feeds...</span></div>';
  document.getElementById("lastRun").textContent = "Loading...";
  cache = await fetchAll();
  document.getElementById("lastRun").innerHTML = `Last fetched <strong>${new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit", hour12: true })} IST</strong>`;
  expandedDays = {}; openRuns = new Set();
  render();
  setTimeout(() => refreshBtn.classList.remove("spinning"), 400);
}

document.querySelectorAll(".pill-btn").forEach((p) => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".pill-btn").forEach((x) => x.classList.remove("active"));
    p.classList.add("active");
    currentWindow = +p.getAttribute("data-days");
    expandedDays = {}; openRuns = new Set();
    render();
  });
});
document.getElementById("refreshBtn").addEventListener("click", load);
load();
</script>
</body>
</html>

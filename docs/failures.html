<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Failures Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  :root {
    --bg-base: #0a0e1a;
    --bg-grad: radial-gradient(ellipse 70% 50% at 20% -10%, rgba(124, 58, 237, 0.14), transparent 55%),
               radial-gradient(ellipse 60% 40% at 100% 0%, rgba(220, 38, 38, 0.10), transparent 55%),
               #0a0e1a;
    --surface: #111727;
    --surface-2: #161e30;
    --surface-3: #1c2640;
    --line: #1f2a44;
    --line-2: #2a3856;
    --text: #f1f5f9;
    --text-2: #cbd5e1;
    --muted: #94a3b8;
    --faint: #64748b;
    --brand: #a78bfa;
    --brand-2: #c4b5fd;
    --brand-glow: rgba(167, 139, 250, 0.22);
    --ok: #10b981;
    --ok-soft: rgba(16, 185, 129, 0.12);
    --ok-line: rgba(16, 185, 129, 0.30);
    --warn: #f59e0b;
    --warn-soft: rgba(245, 158, 11, 0.12);
    --warn-line: rgba(245, 158, 11, 0.32);
    --err: #ef4444;
    --err-bright: #f87171;
    --err-soft: rgba(239, 68, 68, 0.10);
    --err-line: rgba(239, 68, 68, 0.32);
    --shadow-card: 0 1px 0 rgba(255, 255, 255, 0.03) inset, 0 0 0 1px var(--line);
  }
  body {
    margin: 0; padding: 0;
    background: var(--bg-grad);
    background-attachment: fixed;
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px; line-height: 1.5;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 18px 20px 60px; }

  /* === Compact header (single row) === */
  .topbar {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 4px 0 14px; border-bottom: 1px solid var(--line); margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .topbar h1 {
    margin: 0; font-size: 19px; font-weight: 800; letter-spacing: -0.02em;
    background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    display: flex; align-items: center; gap: 10px;
  }
  .topbar h1 .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--err-bright);
    box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.18), 0 0 14px var(--err);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px rgba(239,68,68,0.12), 0 0 12px var(--err); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0.20), 0 0 20px var(--err); } }
  .topbar .right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .last-fetched { font-size: 11px; color: var(--faint); }
  .last-fetched .v { color: var(--text-2); font-weight: 500; font-variant-numeric: tabular-nums; }
  .pills { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--line); padding: 2px; border-radius: 8px; }
  .pill { background: transparent; border: 0; color: var(--muted); padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .pill:hover { color: var(--text); background: rgba(255, 255, 255, 0.04); }
  .pill.active { background: linear-gradient(180deg, rgba(167,139,250,0.22), rgba(167,139,250,0.08)); color: var(--brand-2); box-shadow: 0 0 0 1px rgba(167,139,250,0.4) inset; }
  .refresh { background: var(--surface); border: 1px solid var(--line); color: var(--muted); padding: 5px 11px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; }
  .refresh:hover { color: var(--text); border-color: var(--line-2); }
  .refresh .arrow { display: inline-block; transition: transform 0.4s ease; }
  .refresh.spinning .arrow { animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === Compact stat strip === */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--surface); border-radius: 10px; padding: 10px 14px; box-shadow: var(--shadow-card); display: flex; align-items: center; gap: 12px; min-width: 0; }
  .stat .ic { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); flex-shrink: 0; }
  .stat .text { display: flex; flex-direction: column; min-width: 0; }
  .stat .l { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; color: var(--faint); text-transform: uppercase; }
  .stat .v { font-size: 22px; font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; margin-top: 1px; }
  .stat .v .of { font-size: 13px; font-weight: 600; color: var(--faint); margin-left: 4px; }
  .stat.danger .v { color: var(--err-bright); }
  .stat.danger .ic { background: var(--err); box-shadow: 0 0 8px var(--err); }
  .stat.ok .v { color: var(--ok); }
  .stat.ok .ic { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .stat.brand .v { color: var(--brand-2); }
  .stat.brand .ic { background: var(--brand); box-shadow: 0 0 8px var(--brand); }
  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }

  /* === Project matrix (the main view) === */
  .matrix-card {
    background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-card);
    overflow: hidden; margin-bottom: 14px;
  }
  .matrix-head {
    padding: 10px 16px; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line); background: var(--surface-2);
  }
  .matrix-head .t { font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: 0.2px; }
  .matrix-head .legend { margin-left: auto; display: inline-flex; gap: 12px; font-size: 10px; color: var(--faint); font-weight: 500; }
  .matrix-head .legend .lg { display: inline-flex; align-items: center; gap: 5px; }
  .matrix-head .legend .sw { width: 11px; height: 11px; border-radius: 2px; }
  .matrix-row {
    display: grid;
    grid-template-columns: 230px 90px 1fr 70px;
    align-items: center;
    padding: 9px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer; user-select: none;
    transition: background 0.12s;
    gap: 14px;
  }
  .matrix-row:last-child { border-bottom: 0; }
  .matrix-row:hover { background: rgba(255, 255, 255, 0.025); }
  .matrix-row.is-error { cursor: default; opacity: 0.7; }
  .matrix-row.is-active { background: rgba(167, 139, 250, 0.06); }

  .mr-name { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .mr-name .nm { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.01em; }
  .mr-name .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .mr-name .stat-dot.ok { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .mr-name .stat-dot.warn { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
  .mr-name .stat-dot.danger { background: var(--err); box-shadow: 0 0 8px var(--err); }
  .mr-name .stat-dot.faint { background: var(--faint); }

  .mr-badge {
    font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 999px; text-align: center;
    letter-spacing: 0.4px; font-variant-numeric: tabular-nums;
  }
  .mr-badge.ok { background: var(--ok-soft); color: var(--ok); border: 1px solid var(--ok-line); }
  .mr-badge.warn { background: var(--warn-soft); color: var(--warn); border: 1px solid var(--warn-line); }
  .mr-badge.danger { background: var(--err-soft); color: var(--err-bright); border: 1px solid var(--err-line); }
  .mr-badge.error { background: rgba(148,163,184,0.08); color: var(--muted); border: 1px solid var(--line); }

  .heat { display: flex; gap: 2px; align-items: stretch; min-width: 0; }
  .heat-cell { flex: 1; min-width: 6px; height: 22px; border-radius: 3px; background: #1a2236; transition: transform 0.12s; cursor: default; }
  .heat-cell.has-run.all-pass { background: linear-gradient(180deg, #10b981, #059669); }
  .heat-cell.has-run.some-fail { background: linear-gradient(180deg, #f59e0b, #d97706); }
  .heat-cell.has-run.all-fail { background: linear-gradient(180deg, #ef4444, #b91c1c); }
  .heat-cell.is-today { box-shadow: 0 0 0 1.5px var(--brand); z-index: 2; }
  .heat-cell:hover { transform: scaleY(1.25); }

  .mr-rate { text-align: right; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .mr-rate .pct { font-weight: 700; color: var(--text-2); }
  .mr-rate .sub { font-size: 10px; color: var(--faint); display: block; margin-top: 1px; }

  /* Drill-down panel */
  .detail-card {
    background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-card);
    margin-bottom: 14px; overflow: hidden;
  }
  .detail-head {
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, rgba(167,139,250,0.10), rgba(167,139,250,0.02));
    border-bottom: 1px solid var(--line);
  }
  .detail-head .nm { font-size: 14px; font-weight: 700; color: var(--text); }
  .detail-head .meta { font-size: 11px; color: var(--muted); margin-left: 8px; }
  .detail-head .meta strong { color: var(--err-bright); font-weight: 700; }
  .detail-head .dlink { font-size: 11px; color: var(--brand); text-decoration: none; padding: 3px 8px; border-radius: 4px; margin-left: auto; }
  .detail-head .dlink:hover { background: var(--brand-glow); }
  .detail-head .close { background: var(--surface-2); border: 1px solid var(--line); color: var(--muted); width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; }
  .detail-head .close:hover { color: var(--text); border-color: var(--line-2); }
  .detail-body { padding: 14px 16px 16px; }

  .day { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--line); }
  .day:first-child { margin-top: 0; padding-top: 0; border-top: 0; }
  .day-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .day-date { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  .day-rel {
    font-size: 9px; font-weight: 700; color: var(--brand-2); letter-spacing: 0.6px; text-transform: uppercase;
    background: var(--brand-glow); padding: 2px 7px; border-radius: 999px;
  }
  .day-rel.faint { color: var(--faint); background: rgba(148, 163, 184, 0.08); }
  .day-count { margin-left: auto; font-size: 10px; font-weight: 700; color: var(--err-bright); background: var(--err-soft); padding: 3px 9px; border-radius: 999px; border: 1px solid var(--err-line); }

  .run { background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; margin-bottom: 6px; }
  .run-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; font-size: 12px; }
  .run-time { font-family: "JetBrains Mono", monospace; font-weight: 600; color: var(--err-bright); min-width: 76px; font-size: 12px; letter-spacing: -0.02em; }
  .run-counts { color: var(--text); font-weight: 500; }
  .run-counts .x { color: var(--err-bright); font-weight: 800; font-size: 13px; }
  .run-counts .of { color: var(--muted); }
  .run-pass { font-size: 10px; color: var(--faint); font-variant-numeric: tabular-nums; padding: 2px 7px; background: var(--surface-3); border-radius: 4px; }
  .run-extra { font-size: 10px; color: var(--muted); margin-left: auto; padding: 2px 7px; background: var(--surface-3); border-radius: 4px; }

  .fails-preview { margin-top: 8px; font-size: 11px; }
  .fails-preview ul { margin: 0; padding: 0; list-style: none; }
  .fails-preview li { padding: 6px 0; border-top: 1px solid var(--line); }
  .fails-preview li:first-child { border-top: 0; padding-top: 4px; }
  .fails-preview .ftitle { color: var(--text-2); font-weight: 600; font-size: 11px; }
  .fails-preview .fmod { color: var(--brand-2); font-size: 9px; margin-left: 6px; padding: 1px 6px; background: var(--brand-glow); border-radius: 4px; font-weight: 600; letter-spacing: 0.2px; }
  .fails-preview .ferr { color: var(--faint); font-size: 10px; margin-top: 3px; word-break: break-word; line-height: 1.4; font-family: "JetBrains Mono", monospace; max-height: 32px; overflow: hidden; }
  .fails-more { color: var(--brand); font-size: 10px; cursor: pointer; margin-top: 6px; font-weight: 700; user-select: none; display: inline-block; padding: 3px 7px; border-radius: 5px; }
  .fails-more:hover { background: var(--brand-glow); }

  /* Recent feed (right column on wide screens) */
  .twocol { display: grid; grid-template-columns: 1fr; gap: 14px; }
  @media (min-width: 1080px) { .twocol { grid-template-columns: 1fr 320px; } }
  .feed-card { background: var(--surface); border-radius: 12px; box-shadow: var(--shadow-card); overflow: hidden; }
  .feed-head { padding: 10px 14px; border-bottom: 1px solid var(--line); background: var(--surface-2); font-size: 12px; font-weight: 700; color: var(--text); letter-spacing: 0.2px; }
  .feed-list { padding: 6px 0; max-height: 540px; overflow-y: auto; }
  .feed-item { padding: 9px 14px; border-bottom: 1px solid var(--line); font-size: 12px; cursor: pointer; transition: background 0.1s; }
  .feed-item:last-child { border-bottom: 0; }
  .feed-item:hover { background: rgba(255, 255, 255, 0.025); }
  .feed-row1 { display: flex; align-items: baseline; gap: 8px; }
  .feed-time { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--err-bright); font-weight: 600; min-width: 64px; }
  .feed-proj { font-weight: 600; color: var(--text-2); font-size: 12px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .feed-counts { color: var(--err-bright); font-weight: 700; font-size: 11px; }
  .feed-row2 { font-size: 10px; color: var(--faint); margin-top: 2px; padding-left: 72px; }
  .feed-empty { padding: 30px 16px; text-align: center; color: var(--ok); font-size: 12px; font-weight: 600; }

  .loading { text-align: center; padding: 80px 20px; color: var(--faint); font-size: 13px; }
  .loading .spinner { display: inline-block; width: 26px; height: 26px; border: 2px solid var(--line-2); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }

  .footer { margin-top: 24px; text-align: center; font-size: 10px; color: var(--faint); }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <h1><span class="dot"></span>QA Failures Dashboard</h1>
    <div class="right">
      <div class="last-fetched">Last fetched: <span class="v" id="lastFetched">…</span></div>
      <div class="pills">
        <button class="pill" data-days="7">7d</button>
        <button class="pill active" data-days="30">30d</button>
        <button class="pill" data-days="90">90d</button>
        <button class="pill" data-days="0">All</button>
      </div>
      <button class="refresh" id="refreshBtn"><span class="arrow">↻</span> Refresh</button>
    </div>
  </header>

  <div class="stats" id="statsBar"></div>

  <div class="twocol">
    <div>
      <div class="matrix-card" id="matrixCard">
        <div class="loading"><div class="spinner"></div>Loading…</div>
      </div>
      <div id="detailHost"></div>
    </div>
    <div class="feed-card">
      <div class="feed-head">Recent Failures</div>
      <div class="feed-list" id="feedList"></div>
    </div>
  </div>

  <div class="footer">Click any project row to drill into failed runs · Heat-cell colors: green = all passed, amber = some failed, red = all failed, gray = no run</div>
</div>

<script>
const PROJECTS = [
  { name: "Asksam Automation",       short: "Asksam",       dashboard: "https://saira-uwc.github.io/asksam-automation-new/",                              runs: "https://saira-uwc.github.io/asksam-automation-new/history/runs.json", format: "playwright" },
  { name: "Website Automation",      short: "Website",      dashboard: "https://saira-uwc.github.io/Shunyalabs_website/",                                 runs: "https://saira-uwc.github.io/Shunyalabs_website/history/runs.json",     format: "playwright" },
  { name: "Widget Automation",       short: "Widget",       dashboard: "https://saira-uwc.github.io/Shunyalabs_widget/",                                  runs: "https://saira-uwc.github.io/Shunyalabs_widget/history/runs.json",      format: "playwright" },
  { name: "Console Dashboard",       short: "Console",      dashboard: "https://saira-uwc.github.io/Shunyalabs_console/",                                 runs: "https://saira-uwc.github.io/Shunyalabs_console/history/runs.json",     format: "playwright" },
  { name: "Vak BE Automation",       short: "Vak BE",       dashboard: "https://saira-uwc.github.io/Vak_automation/",                                     runs: "https://saira-uwc.github.io/Vak_automation/data.json",                 format: "vak" },
  { name: "Concurrent (Zero Indic)", short: "Concurrent",   dashboard: "https://yamini-pal-singh.github.io/automation-testing/Concurrent-Report.html",   runs: "https://yamini-pal-singh.github.io/automation-testing/concurrent-runs.json", format: "playwright" },
  { name: "Long Audio (Zero Indic)", short: "Long Audio",   dashboard: "https://yamini-pal-singh.github.io/automation-testing/Long-Audio-Report.html",   runs: "https://yamini-pal-singh.github.io/automation-testing/long-audio-runs.json", format: "playwright" },
  { name: "Playground",              short: "Playground",   dashboard: "https://yamini-pal-singh.github.io/playground-testing/Playground-Report.html",   runs: "https://yamini-pal-singh.github.io/playground-testing/playground-runs.json", format: "playwright" },
];

const IST_OFFSET_MS = 5.5 * 3600 * 1000;
const PREVIEW_FAILS = 3;
let currentWindow = 30;
let cache = null;
let activeProjectIdx = null;

function parseToDate(ts) {
  if (!ts) return null;
  if (/Z$/.test(ts)) { const d = new Date(ts); return isNaN(d) ? null : d; }
  if (/\bIST\b/.test(ts)) {
    const m = ts.replace(/\s*IST\s*$/, "").match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
    if (!m) return null;
    return new Date(Date.UTC(+m[1], +m[2] - 1, +m[3], +m[4], +m[5], +m[6]) - IST_OFFSET_MS);
  }
  const m1 = ts.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4}),\s*(\d{1,2}):(\d{2}):(\d{2})\s*(AM|PM)/i);
  if (m1) {
    let [, M, D, Y, h, mn, s, ap] = m1;
    h = +h;
    if (ap.toUpperCase() === "PM" && h < 12) h += 12;
    if (ap.toUpperCase() === "AM" && h === 12) h = 0;
    return new Date(Date.UTC(+Y, +M - 1, +D, h, +mn, +s) - IST_OFFSET_MS);
  }
  const m2 = ts.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
  if (m2) return new Date(Date.UTC(+m2[1], +m2[2] - 1, +m2[3], +m2[4], +m2[5], +m2[6]) - IST_OFFSET_MS);
  const m3 = ts.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m3) return new Date(Date.UTC(+m3[1], +m3[2] - 1, +m3[3], 0, 0, 0) - IST_OFFSET_MS);
  const d = new Date(ts);
  return isNaN(d) ? null : d;
}
function dateKeyIST(date) {
  return new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Kolkata", year: "numeric", month: "2-digit", day: "2-digit" }).format(date);
}
function fmtFullDate(date) {
  return date.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata", weekday: "long", day: "numeric", month: "short", year: "numeric" });
}
function fmtTime(date) {
  return date.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata", hour: "2-digit", minute: "2-digit", hour12: true });
}
function todayKey() { return dateKeyIST(new Date()); }
function relativeDay(key) {
  const t = todayKey();
  if (key === t) return { label: "Today", strong: true };
  const yest = dateKeyIST(new Date(Date.now() - 86400000));
  if (key === yest) return { label: "Yesterday", strong: true };
  const target = new Date(key + "T00:00:00+05:30");
  const days = Math.round((Date.now() - target.getTime()) / 86400000);
  if (days >= 2 && days <= 7) return { label: days + "d ago", strong: false };
  return null;
}

function normalize(raw, fmt) {
  const out = [];
  if (fmt === "vak") {
    for (const r of raw.runs || []) {
      out.push({ timestamp: r.timestamp, total: r.total || 0, passed: r.passed || 0, failed: r.failed || 0, passRate: r.pass_rate || 0, avgLatency: r.avg_latency, failedItems: [] });
    }
    return out;
  }
  for (const r of raw) {
    const summary = r.summary || {};
    const ts = r.startedAt || r.runTimestamp || r.runDate;
    const total = summary.total ?? r.total ?? 0;
    const passed = summary.passed ?? r.passed ?? 0;
    const failed = summary.failed ?? r.failed ?? 0;
    const passRate = r.passRate ?? 0;
    const failedItems = [];
    if (Array.isArray(r.tests)) {
      for (const t of r.tests) {
        const status = (t.status || "").toLowerCase();
        if (status === "failed" || status === "fail") {
          failedItems.push({ title: t.title || t.testPoint || t.name || "(unnamed)", module: t.moduleLabel || t.module || t.moduleName || "", error: (t.error || t.comment || "").split("\n")[0].slice(0, 220) });
        }
      }
    }
    if (failedItems.length === 0 && Array.isArray(r.suites)) {
      for (const s of r.suites) {
        const status = (s.status || "").toLowerCase();
        if (status === "fail" || status === "failed") {
          failedItems.push({ title: s.name || "(unnamed suite)", module: s.category || "", error: s.failure_reason || "" });
        }
      }
    }
    out.push({ timestamp: ts, total, passed, failed, passRate, timeSavedPercent: r.timeSavedPercent, avgLatencyMs: r.avgLatencyMs, failedItems });
  }
  return out;
}

async function fetchAll() {
  return Promise.all(PROJECTS.map(async (p, idx) => {
    try {
      const resp = await fetch(p.runs, { cache: "no-cache" });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const raw = await resp.json();
      const runs = normalize(raw, p.format).map((r) => ({ ...r, _date: parseToDate(r.timestamp) })).filter((r) => r._date);
      runs.sort((a, b) => b._date - a._date);
      return { idx, project: p, runs, error: null };
    } catch (e) {
      return { idx, project: p, runs: [], error: String(e.message || e) };
    }
  }));
}

function buildHeatCells(runsInWindow, days) {
  const today = todayKey();
  const cells = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    cells.push({ key: dateKeyIST(d), date: d, runs: [] });
  }
  const byKey = new Map(cells.map((c) => [c.key, c]));
  for (const r of runsInWindow) {
    const k = dateKeyIST(r._date);
    if (byKey.has(k)) byKey.get(k).runs.push(r);
  }
  return cells.map((c) => {
    let cls = "heat-cell";
    if (c.runs.length) {
      cls += " has-run";
      const failedCount = c.runs.filter((r) => r.failed > 0).length;
      if (failedCount === 0) cls += " all-pass";
      else if (failedCount === c.runs.length) cls += " all-fail";
      else cls += " some-fail";
    }
    if (c.key === today) cls += " is-today";
    const failedRuns = c.runs.filter((r) => r.failed > 0).length;
    const tip = c.runs.length === 0
      ? `${c.key} — no runs`
      : failedRuns === 0
        ? `${c.key} — ${c.runs.length} run${c.runs.length === 1 ? "" : "s"} all passed`
        : `${c.key} — ${failedRuns}/${c.runs.length} runs failed`;
    return { cls, tip };
  });
}

function severity(failedRuns, totalRuns) {
  if (totalRuns === 0) return "error";
  if (failedRuns === 0) return "ok";
  return failedRuns / totalRuns >= 0.5 ? "danger" : "warn";
}

function render() {
  if (!cache) return;
  const cutoff = currentWindow > 0 ? Date.now() - currentWindow * 86400000 : 0;
  const heatDays = currentWindow > 0 ? Math.min(currentWindow, 30) : 30;

  let totalFailedRuns = 0, totalFailedTests = 0, projectsWithFailures = 0, projectsWithErrors = 0;

  // Build matrix rows
  const rowsHtml = cache.map((entry) => {
    const { project, runs, error, idx } = entry;
    if (error) {
      projectsWithErrors++;
      return `
        <div class="matrix-row is-error" data-idx="${idx}">
          <div class="mr-name"><span class="stat-dot faint"></span><span class="nm">${esc(project.name)}</span></div>
          <span class="mr-badge error">FETCH ERR</span>
          <div></div>
          <div class="mr-rate"><span class="sub">${esc(error.slice(0, 30))}</span></div>
        </div>`;
    }
    const inWindow = runs.filter((r) => !cutoff || r._date.getTime() >= cutoff);
    const failedRuns = inWindow.filter((r) => r.failed > 0);
    const failedTestsCount = failedRuns.reduce((s, r) => s + r.failed, 0);
    totalFailedRuns += failedRuns.length;
    totalFailedTests += failedTestsCount;
    if (failedRuns.length) projectsWithFailures++;

    const sev = severity(failedRuns.length, inWindow.length);
    const dotCls = inWindow.length === 0 ? "faint" : sev === "ok" ? "ok" : sev;
    const cells = buildHeatCells(inWindow, heatDays);
    const heatHtml = cells.map((c) => `<div class="${c.cls}" title="${esc(c.tip)}"></div>`).join("");

    let badge;
    if (inWindow.length === 0) badge = `<span class="mr-badge error">NO RUNS</span>`;
    else if (failedRuns.length === 0) badge = `<span class="mr-badge ok">ALL PASS</span>`;
    else {
      const everyFailed = failedRuns.length === inWindow.length && inWindow.length > 1;
      badge = `<span class="mr-badge ${sev}">${failedRuns.length} ${everyFailed ? "ALL FAIL" : "FAILED"}</span>`;
    }

    const overallRate = inWindow.length === 0 ? "—" :
      `${Math.round((inWindow.length - failedRuns.length) / inWindow.length * 100)}%`;
    const subText = inWindow.length === 0
      ? "in window"
      : `${failedTestsCount} test${failedTestsCount === 1 ? "" : "s"}`;

    const isActive = activeProjectIdx === idx ? " is-active" : "";
    return `
      <div class="matrix-row${isActive}" data-idx="${idx}">
        <div class="mr-name"><span class="stat-dot ${dotCls}"></span><span class="nm">${esc(project.name)}</span></div>
        ${badge}
        <div class="heat">${heatHtml}</div>
        <div class="mr-rate"><span class="pct">${overallRate}</span><span class="sub">${subText}</span></div>
      </div>`;
  }).join("");

  document.getElementById("matrixCard").innerHTML = `
    <div class="matrix-head">
      <span class="t">All Projects · Last ${heatDays} days</span>
      <span class="legend">
        <span class="lg"><span class="sw" style="background:#1a2236;"></span>No run</span>
        <span class="lg"><span class="sw" style="background:linear-gradient(180deg,#10b981,#059669);"></span>All pass</span>
        <span class="lg"><span class="sw" style="background:linear-gradient(180deg,#f59e0b,#d97706);"></span>Some fail</span>
        <span class="lg"><span class="sw" style="background:linear-gradient(180deg,#ef4444,#b91c1c);"></span>All fail</span>
      </span>
    </div>
    ${rowsHtml}
  `;

  // Stats
  document.getElementById("statsBar").innerHTML = `
    <div class="stat brand"><span class="ic"></span><div class="text"><span class="l">Window</span><span class="v">${currentWindow > 0 ? currentWindow + "d" : "All"}</span></div></div>
    <div class="stat ${projectsWithFailures > 0 ? "danger" : "ok"}"><span class="ic"></span><div class="text"><span class="l">Projects with failures</span><span class="v">${projectsWithFailures}<span class="of">/${PROJECTS.length}</span></span></div></div>
    <div class="stat ${totalFailedRuns > 0 ? "danger" : "ok"}"><span class="ic"></span><div class="text"><span class="l">Failed runs</span><span class="v">${totalFailedRuns}</span></div></div>
    <div class="stat ${totalFailedTests > 0 ? "danger" : "ok"}"><span class="ic"></span><div class="text"><span class="l">Failed tests</span><span class="v">${totalFailedTests}</span></div></div>
  `;

  // Recent failures feed
  renderFeed(cutoff);

  // Detail panel (if any active)
  renderDetail();

  bindMatrix();
}

function renderFeed(cutoff) {
  const allFailures = [];
  for (const entry of cache) {
    if (entry.error) continue;
    for (const r of entry.runs) {
      if (cutoff && r._date.getTime() < cutoff) continue;
      if (r.failed <= 0) continue;
      allFailures.push({ ...r, _project: entry.project, _idx: entry.idx });
    }
  }
  allFailures.sort((a, b) => b._date - a._date);
  const top = allFailures.slice(0, 24);
  if (top.length === 0) {
    document.getElementById("feedList").innerHTML = `<div class="feed-empty">🎉 No failures in this window.</div>`;
    return;
  }
  document.getElementById("feedList").innerHTML = top.map((r) => {
    const time = fmtTime(r._date);
    const dateLabel = (() => {
      const k = dateKeyIST(r._date);
      const rel = relativeDay(k);
      if (rel) return rel.label;
      return r._date.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short" });
    })();
    return `
      <div class="feed-item" data-idx="${r._idx}">
        <div class="feed-row1">
          <span class="feed-time">${esc(time)}</span>
          <span class="feed-proj">${esc(r._project.short)}</span>
          <span class="feed-counts">${r.failed}/${r.total}</span>
        </div>
        <div class="feed-row2">${esc(dateLabel)} · ${r.passRate}% pass</div>
      </div>`;
  }).join("");
  document.querySelectorAll(".feed-item").forEach((el) => {
    el.addEventListener("click", () => {
      activeProjectIdx = +el.getAttribute("data-idx");
      render();
      document.getElementById("detailHost").scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });
}

function renderDetail() {
  const host = document.getElementById("detailHost");
  if (activeProjectIdx == null) { host.innerHTML = ""; return; }
  const entry = cache[activeProjectIdx];
  if (!entry || entry.error) { host.innerHTML = ""; return; }
  const cutoff = currentWindow > 0 ? Date.now() - currentWindow * 86400000 : 0;
  const inWindow = entry.runs.filter((r) => !cutoff || r._date.getTime() >= cutoff);
  const failedRuns = inWindow.filter((r) => r.failed > 0);
  if (failedRuns.length === 0) {
    host.innerHTML = `
      <div class="detail-card">
        <div class="detail-head">
          <span class="nm">${esc(entry.project.name)}</span>
          <span class="meta">No failures in this window — ${inWindow.length} run${inWindow.length === 1 ? "" : "s"} all passed</span>
          <button class="close" data-action="close-detail">×</button>
        </div>
      </div>`;
    bindDetail();
    return;
  }

  const failedTests = failedRuns.reduce((s, r) => s + r.failed, 0);
  const byDate = new Map();
  for (const r of failedRuns) {
    const k = dateKeyIST(r._date);
    if (!byDate.has(k)) byDate.set(k, []);
    byDate.get(k).push(r);
  }
  const dateKeys = [...byDate.keys()].sort().reverse();
  const dayGroups = dateKeys.map((k) => {
    const list = byDate.get(k);
    const rel = relativeDay(k);
    return `
      <div class="day">
        <div class="day-head">
          <span class="day-date">${esc(fmtFullDate(list[0]._date))}</span>
          ${rel ? `<span class="day-rel ${rel.strong ? "" : "faint"}">${esc(rel.label)}</span>` : ""}
          <span class="day-count">${list.length} failed run${list.length === 1 ? "" : "s"}</span>
        </div>
        ${list.map(renderRun).join("")}
      </div>`;
  }).join("");

  host.innerHTML = `
    <div class="detail-card">
      <div class="detail-head">
        <span class="nm">${esc(entry.project.name)}</span>
        <span class="meta"><strong>${failedRuns.length}</strong> of ${inWindow.length} runs failed · ${failedTests} test${failedTests === 1 ? "" : "s"}</span>
        <a class="dlink" href="${esc(entry.project.dashboard)}" target="_blank" rel="noopener">↗ open project dashboard</a>
        <button class="close" data-action="close-detail" title="Close">×</button>
      </div>
      <div class="detail-body">${dayGroups}</div>
    </div>`;
  bindDetail();
}

function renderRun(r) {
  const time = fmtTime(r._date);
  let extra = "";
  if (r.avgLatencyMs != null) extra = `avg latency ${(r.avgLatencyMs / 1000).toFixed(1)}s`;
  else if (r.timeSavedPercent != null) extra = `time saved ${r.timeSavedPercent}%`;
  else if (r.avgLatency != null) extra = `avg latency ${(r.avgLatency / 1000).toFixed(1)}s`;

  let preview = "";
  if (r.failedItems.length) {
    const visible = r.failedItems.slice(0, PREVIEW_FAILS);
    const hidden = r.failedItems.slice(PREVIEW_FAILS);
    const item = (f, hide) => `<li${hide ? ' class="hidden-fail" style="display:none;"' : ""}>
      <div><span class="ftitle">${esc(f.title)}</span>${f.module ? ` <span class="fmod">${esc(f.module)}</span>` : ""}</div>
      ${f.error ? `<div class="ferr">${esc(f.error)}</div>` : ""}
    </li>`;
    const visibleHtml = visible.map((f) => item(f, false)).join("");
    const hiddenHtml = hidden.map((f) => item(f, true)).join("");
    const more = hidden.length ? `<div class="fails-more" data-action="toggle-more">▾ Show ${hidden.length} more</div>` : "";
    preview = `<div class="fails-preview"><ul>${visibleHtml}${hiddenHtml}</ul>${more}</div>`;
  }
  return `
    <div class="run">
      <div class="run-head">
        <span class="run-time">${esc(time)}</span>
        <span class="run-counts"><span class="x">${r.failed}</span><span class="of"> / ${r.total}</span> failed</span>
        <span class="run-pass">${r.passRate}% pass</span>
        ${extra ? `<span class="run-extra">${esc(extra)}</span>` : ""}
      </div>
      ${preview}
    </div>`;
}

function bindMatrix() {
  document.querySelectorAll(".matrix-row").forEach((row) => {
    if (row.classList.contains("is-error")) return;
    row.addEventListener("click", () => {
      const idx = +row.getAttribute("data-idx");
      activeProjectIdx = activeProjectIdx === idx ? null : idx;
      render();
      if (activeProjectIdx != null) {
        setTimeout(() => document.getElementById("detailHost").scrollIntoView({ behavior: "smooth", block: "start" }), 50);
      }
    });
  });
}

function bindDetail() {
  document.querySelectorAll('[data-action="close-detail"]').forEach((b) => {
    b.addEventListener("click", () => { activeProjectIdx = null; render(); });
  });
  document.querySelectorAll('[data-action="toggle-more"]').forEach((b) => {
    b.addEventListener("click", () => {
      const ul = b.parentElement.querySelector("ul");
      const hidden = ul.querySelectorAll(".hidden-fail");
      const isShown = hidden.length && hidden[0].style.display !== "none";
      hidden.forEach((li) => { li.style.display = isShown ? "none" : "block"; });
      b.textContent = isShown ? `▾ Show ${hidden.length} more` : `▴ Hide`;
    });
  });
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function load() {
  const refreshBtn = document.getElementById("refreshBtn");
  refreshBtn.classList.add("spinning");
  document.getElementById("matrixCard").innerHTML = '<div class="loading"><div class="spinner"></div>Loading project feeds…</div>';
  document.getElementById("lastFetched").textContent = "…";
  cache = await fetchAll();
  document.getElementById("lastFetched").textContent = new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit", hour12: true }) + " IST";
  render();
  setTimeout(() => refreshBtn.classList.remove("spinning"), 400);
}

document.querySelectorAll(".pill").forEach((p) => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".pill").forEach((x) => x.classList.remove("active"));
    p.classList.add("active");
    currentWindow = +p.getAttribute("data-days");
    render();
  });
});
document.getElementById("refreshBtn").addEventListener("click", load);

load();
</script>
</body>

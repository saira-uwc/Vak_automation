<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Downtime Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  :root {
    --bg-base: #0a0e1a;
    --bg-grad: radial-gradient(ellipse 80% 50% at 30% -10%, rgba(124,58,237,0.13), transparent 55%),
               radial-gradient(ellipse 60% 40% at 100% 0%, rgba(220,38,38,0.10), transparent 55%),
               #0a0e1a;
    --surface: #111727;
    --surface-2: #161e30;
    --surface-3: #1c2640;
    --line: #1f2a44;
    --line-2: #2a3856;
    --text: #f1f5f9;
    --text-2: #cbd5e1;
    --muted: #94a3b8;
    --faint: #64748b;
    --brand: #a78bfa;
    --brand-2: #c4b5fd;
    --brand-glow: rgba(167,139,250,0.22);
    --ok: #10b981;
    --ok-soft: rgba(16,185,129,0.10);
    --ok-line: rgba(16,185,129,0.30);
    --warn: #f59e0b;
    --warn-soft: rgba(245,158,11,0.10);
    --warn-line: rgba(245,158,11,0.32);
    --err: #ef4444;
    --err-bright: #f87171;
    --err-soft: rgba(239,68,68,0.10);
    --err-line: rgba(239,68,68,0.32);
    --shadow-card: 0 1px 0 rgba(255,255,255,0.03) inset, 0 0 0 1px var(--line);
  }
  body {
    margin: 0; padding: 0;
    background: var(--bg-grad); background-attachment: fixed;
    color: var(--text);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }
  .wrap { max-width: 920px; margin: 0 auto; padding: 22px 22px 80px; }

  /* === Header === */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 4px 0 16px; border-bottom: 1px solid var(--line); margin-bottom: 16px; flex-wrap: wrap; }
  .topbar h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; background: linear-gradient(180deg,#fff,#cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: flex; align-items: center; gap: 10px; }
  .topbar h1 .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--err-bright); box-shadow: 0 0 0 4px rgba(239,68,68,0.18), 0 0 14px var(--err); animation: pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 3px rgba(239,68,68,0.12), 0 0 12px var(--err); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0.20), 0 0 20px var(--err); } }
  .topbar .right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .last-fetched { font-size: 11px; color: var(--faint); }
  .last-fetched .v { color: var(--text-2); font-weight: 500; font-variant-numeric: tabular-nums; }
  .pills { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--line); padding: 2px; border-radius: 8px; }
  .pill { background: transparent; border: 0; color: var(--muted); padding: 5px 11px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; }
  .pill:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .pill.active { background: linear-gradient(180deg, rgba(167,139,250,0.22), rgba(167,139,250,0.08)); color: var(--brand-2); box-shadow: 0 0 0 1px rgba(167,139,250,0.4) inset; }
  .refresh { background: var(--surface); border: 1px solid var(--line); color: var(--muted); padding: 5px 11px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; }
  .refresh:hover { color: var(--text); border-color: var(--line-2); }
  .refresh .arrow { display: inline-block; transition: transform 0.4s ease; }
  .refresh.spinning .arrow { animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === Stats === */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  .stat { background: var(--surface); border-radius: 10px; padding: 12px 14px; box-shadow: var(--shadow-card); display: flex; align-items: center; gap: 12px; min-width: 0; }
  .stat .ic { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); flex-shrink: 0; }
  .stat .text { display: flex; flex-direction: column; min-width: 0; }
  .stat .l { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; color: var(--faint); text-transform: uppercase; }
  .stat .v { font-size: 22px; font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; margin-top: 2px; }
  .stat .v .of { font-size: 13px; font-weight: 600; color: var(--faint); margin-left: 4px; }
  .stat.danger .v { color: var(--err-bright); }
  .stat.danger .ic { background: var(--err); box-shadow: 0 0 8px var(--err); }
  .stat.ok .v { color: var(--ok); }
  .stat.ok .ic { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
  .stat.brand .v { color: var(--brand-2); }
  .stat.brand .ic { background: var(--brand); box-shadow: 0 0 8px var(--brand); }
  @media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }

  /* === Healthy strip === */
  .healthy { background: linear-gradient(180deg, rgba(16,185,129,0.05), rgba(16,185,129,0.01)); border: 1px solid var(--ok-line); border-radius: 12px; padding: 11px 16px; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .healthy .h-label { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; color: var(--ok); text-transform: uppercase; }
  .healthy .h-pill { background: var(--surface); border: 1px solid var(--ok-line); color: var(--text-2); padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 7px; }
  .healthy .h-pill::before { content: "✓"; color: var(--ok); font-weight: 800; }
  .healthy .h-pill .num { color: var(--faint); font-weight: 500; font-size: 11px; }

  /* === Project sections === */
  .section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--faint);
    text-transform: uppercase; margin: 24px 0 12px; padding-left: 4px;
  }
  .section-label .count { color: var(--err-bright); margin-left: 6px; }

  .proj { background: var(--surface); border-radius: 14px; box-shadow: var(--shadow-card); margin-bottom: 14px; overflow: hidden; }

  .proj-head { padding: 16px 20px 14px; display: flex; align-items: flex-start; gap: 16px; border-bottom: 1px solid var(--line); }
  .proj-num {
    flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: "JetBrains Mono", monospace; font-size: 18px; font-weight: 800;
    letter-spacing: -0.02em;
  }
  .proj-num.danger { background: linear-gradient(180deg, rgba(239,68,68,0.20), rgba(239,68,68,0.05)); color: var(--err-bright); border: 1px solid var(--err-line); box-shadow: inset 0 0 18px rgba(239,68,68,0.16); }
  .proj-num.warn { background: linear-gradient(180deg, rgba(245,158,11,0.18), rgba(245,158,11,0.04)); color: var(--warn); border: 1px solid var(--warn-line); }
  .proj-num.error { background: var(--surface-2); color: var(--muted); border: 1px solid var(--line); }
  .proj-info { flex: 1; min-width: 0; }
  .proj-name { font-size: 17px; font-weight: 800; color: var(--text); letter-spacing: -0.01em; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .proj-name .dlink { font-size: 11px; font-weight: 600; color: var(--brand); text-decoration: none; padding: 3px 8px; border-radius: 5px; }
  .proj-name .dlink:hover { background: var(--brand-glow); }
  .proj-summary { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .proj-summary strong { color: var(--err-bright); font-weight: 700; }
  .proj-summary .every { color: var(--err-bright); font-weight: 700; padding: 1px 7px; background: var(--err-soft); border-radius: 4px; margin-left: 6px; font-size: 11px; }

  /* Compact 30-day strip per project */
  .strip { display: flex; gap: 2px; align-items: stretch; padding: 12px 20px 10px; }
  .strip-cell { flex: 1; min-width: 7px; height: 18px; border-radius: 3px; background: #1a2236; transition: transform 0.12s; }
  .strip-cell.has-run.all-pass { background: linear-gradient(180deg, #10b981, #059669); }
  .strip-cell.has-run.some-fail { background: linear-gradient(180deg, #f59e0b, #d97706); }
  .strip-cell.has-run.all-fail { background: linear-gradient(180deg, #ef4444, #b91c1c); }
  .strip-cell.is-today { box-shadow: 0 0 0 1.5px var(--brand); z-index: 1; }
  .strip-cell:hover { transform: scaleY(1.3); }
  .strip-axis { display: flex; justify-content: space-between; padding: 0 20px 10px; font-size: 10px; color: var(--faint); font-weight: 500; }

  /* Body: list of downtime days */
  .proj-body { padding: 4px 20px 18px; }

  .day { padding: 12px 0; border-top: 1px solid var(--line); }
  .day:first-child { border-top: 0; padding-top: 6px; }
  .day-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
  .day-bullet { width: 8px; height: 8px; border-radius: 50%; background: var(--err); box-shadow: 0 0 7px var(--err); flex-shrink: 0; align-self: center; }
  .day-date { font-size: 14px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
  .day-rel {
    font-size: 9px; font-weight: 700; color: var(--brand-2); letter-spacing: 0.6px; text-transform: uppercase;
    background: var(--brand-glow); padding: 2px 7px; border-radius: 999px;
  }
  .day-rel.faint { color: var(--faint); background: rgba(148,163,184,0.08); }
  .day-counts { margin-left: auto; font-size: 12px; color: var(--err-bright); font-weight: 700; }
  .day-counts .sub { color: var(--faint); font-weight: 500; margin-left: 2px; }

  /* Time pills + drilldown */
  .times { display: flex; gap: 6px; flex-wrap: wrap; padding-left: 22px; }
  .time-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--surface-2); border: 1px solid var(--err-line);
    color: var(--err-bright); padding: 6px 12px;
    border-radius: 7px; font-family: "JetBrains Mono", monospace;
    font-weight: 600; font-size: 12px; cursor: pointer;
    transition: all 0.12s; user-select: none;
  }
  .time-pill:hover { border-color: var(--err); background: rgba(239,68,68,0.10); }
  .time-pill.is-open { background: rgba(239,68,68,0.12); border-color: var(--err); }
  .time-pill .counts { font-family: "Inter", sans-serif; color: var(--text); font-weight: 500; font-size: 11px; }
  .time-pill .counts strong { color: var(--err-bright); font-weight: 800; }

  .run-detail {
    display: none; margin: 10px 0 4px 22px;
    padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px;
  }
  .run-detail.is-open { display: block; }
  .run-detail-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; font-size: 12px; margin-bottom: 8px; }
  .run-detail-row .label { font-size: 10px; font-weight: 700; color: var(--faint); letter-spacing: 0.6px; text-transform: uppercase; }
  .run-detail-row .pass { font-size: 11px; color: var(--faint); }
  .run-detail-row .extra { font-size: 11px; color: var(--muted); padding: 2px 7px; background: var(--surface-3); border-radius: 4px; }

  .fails-list { margin: 0; padding: 0; list-style: none; }
  .fails-list li { padding: 6px 0; border-top: 1px dashed var(--line); }
  .fails-list li:first-child { border-top: 0; padding-top: 0; }
  .ftitle { color: var(--text-2); font-weight: 600; font-size: 12px; }
  .fmod { color: var(--brand-2); font-size: 9px; margin-left: 6px; padding: 1px 6px; background: var(--brand-glow); border-radius: 4px; font-weight: 600; letter-spacing: 0.2px; }
  .ferr { color: var(--faint); font-size: 11px; margin-top: 3px; word-break: break-word; line-height: 1.4; font-family: "JetBrains Mono", monospace; max-height: 36px; overflow: hidden; }
  .fno-detail { color: var(--faint); font-style: italic; font-size: 11px; }

  .show-more {
    padding: 10px 0 4px; text-align: center;
  }
  .show-more button {
    background: var(--surface-2); border: 1px solid var(--line); color: var(--brand-2);
    padding: 7px 14px; border-radius: 8px; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .show-more button:hover { border-color: var(--line-2); background: var(--surface-3); }

  .empty-line { padding: 20px; font-size: 13px; color: var(--muted); text-align: center; }
  .empty-line.ok { color: var(--ok); font-weight: 600; }
  .loading { text-align: center; padding: 80px 20px; color: var(--faint); font-size: 13px; }
  .loading .spinner { display: inline-block; width: 26px; height: 26px; border: 2px solid var(--line-2); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }

  .footer { margin-top: 30px; text-align: center; font-size: 11px; color: var(--faint); }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <h1><span class="dot"></span>QA Downtime Report</h1>
    <div class="right">
      <div class="last-fetched">Last fetched: <span class="v" id="lastFetched">…</span></div>
      <div class="pills">
        <button class="pill" data-days="7">7d</button>
        <button class="pill active" data-days="30">30d</button>
        <button class="pill" data-days="60">60d</button>
        <button class="pill" data-days="90">90d</button>
      </div>
      <button class="refresh" id="refreshBtn"><span class="arrow">↻</span> Refresh</button>
    </div>
  </header>

  <div class="stats" id="statsBar"></div>

  <div id="content"><div class="loading"><div class="spinner"></div>Loading project feeds…</div></div>

  <div class="footer">Click any time pill to see exactly which tests failed in that run</div>
</div>

<script>
const PROJECTS = [
  { name: "Asksam Automation",       short: "Asksam",       dashboard: "https://saira-uwc.github.io/asksam-automation-new/",                              runs: "https://saira-uwc.github.io/asksam-automation-new/history/runs.json", format: "playwright" },
  { name: "Website Automation",      short: "Website",      dashboard: "https://saira-uwc.github.io/Shunyalabs_website/",                                 runs: "https://saira-uwc.github.io/Shunyalabs_website/history/runs.json",     format: "playwright" },
  { name: "Widget Automation",       short: "Widget",       dashboard: "https://saira-uwc.github.io/Shunyalabs_widget/",                                  runs: "https://saira-uwc.github.io/Shunyalabs_widget/history/runs.json",      format: "playwright" },
  { name: "Console Dashboard",       short: "Console",      dashboard: "https://saira-uwc.github.io/Shunyalabs_console/",                                 runs: "https://saira-uwc.github.io/Shunyalabs_console/history/runs.json",     format: "playwright" },
  { name: "Vak BE Automation",       short: "Vak BE",       dashboard: "https://saira-uwc.github.io/Vak_automation/",                                     runs: "https://saira-uwc.github.io/Vak_automation/data.json",                 format: "vak" },
  { name: "Concurrent (Zero Indic)", short: "Concurrent",   dashboard: "https://yamini-pal-singh.github.io/automation-testing/Concurrent-Report.html",   runs: "https://yamini-pal-singh.github.io/automation-testing/concurrent-runs.json", format: "playwright" },
  { name: "Long Audio (Zero Indic)", short: "Long Audio",   dashboard: "https://yamini-pal-singh.github.io/automation-testing/Long-Audio-Report.html",   runs: "https://yamini-pal-singh.github.io/automation-testing/long-audio-runs.json", format: "playwright" },
  { name: "Playground",              short: "Playground",   dashboard: "https://yamini-pal-singh.github.io/playground-testing/Playground-Report.html",   runs: "https://yamini-pal-singh.github.io/playground-testing/playground-runs.json", format: "playwright" },
];

const IST_OFFSET_MS = 5.5 * 3600 * 1000;
const DEFAULT_VISIBLE_DAYS = 5;
let currentWindow = 30;
let cache = null;
let expandedDays = {}; // projectIdx -> bool (show all days)
let openRuns = new Set(); // "projectIdx-runIdx"

function parseToDate(ts) {
  if (!ts) return null;
  if (/Z$/.test(ts)) { const d = new Date(ts); return isNaN(d) ? null : d; }
  if (/\bIST\b/.test(ts)) {
    const m = ts.replace(/\s*IST\s*$/, "").match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
    if (!m) return null;
    return new Date(Date.UTC(+m[1], +m[2] - 1, +m[3], +m[4], +m[5], +m[6]) - IST_OFFSET_MS);
  }
  const m1 = ts.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4}),\s*(\d{1,2}):(\d{2}):(\d{2})\s*(AM|PM)/i);
  if (m1) {
    let [, M, D, Y, h, mn, s, ap] = m1;
    h = +h;
    if (ap.toUpperCase() === "PM" && h < 12) h += 12;
    if (ap.toUpperCase() === "AM" && h === 12) h = 0;
    return new Date(Date.UTC(+Y, +M - 1, +D, h, +mn, +s) - IST_OFFSET_MS);
  }
  const m2 = ts.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2}):(\d{2})$/);
  if (m2) return new Date(Date.UTC(+m2[1], +m2[2] - 1, +m2[3], +m2[4], +m2[5], +m2[6]) - IST_OFFSET_MS);
  const m3 = ts.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m3) return new Date(Date.UTC(+m3[1], +m3[2] - 1, +m3[3], 0, 0, 0) - IST_OFFSET_MS);
  const d = new Date(ts);
  return isNaN(d) ? null : d;
}
function dateKeyIST(date) { return new Intl.DateTimeFormat("en-CA", { timeZone: "Asia/Kolkata", year: "numeric", month: "2-digit", day: "2-digit" }).format(date); }
function fmtFullDate(date) { return date.toLocaleDateString("en-IN", { timeZone: "Asia/Kolkata", weekday: "long", day: "numeric", month: "short", year: "numeric" }); }
function fmtTime(date) { return date.toLocaleTimeString("en-IN", { timeZone: "Asia/Kolkata", hour: "2-digit", minute: "2-digit", hour12: true }); }
function todayKey() { return dateKeyIST(new Date()); }
function relativeDay(key) {
  const t = todayKey();
  if (key === t) return { label: "Today", strong: true };
  const yest = dateKeyIST(new Date(Date.now() - 86400000));
  if (key === yest) return { label: "Yesterday", strong: true };
  const target = new Date(key + "T00:00:00+05:30");
  const days = Math.round((Date.now() - target.getTime()) / 86400000);
  if (days >= 2 && days <= 14) return { label: days + " days ago", strong: false };
  return null;
}

function normalize(raw, fmt) {
  const out = [];
  if (fmt === "vak") {
    for (const r of raw.runs || []) {
      out.push({ timestamp: r.timestamp, total: r.total || 0, passed: r.passed || 0, failed: r.failed || 0, passRate: r.pass_rate || 0, avgLatency: r.avg_latency, failedItems: [] });
    }
    return out;
  }
  for (const r of raw) {
    const summary = r.summary || {};
    const ts = r.startedAt || r.runTimestamp || r.runDate;
    const total = summary.total ?? r.total ?? 0;
    const passed = summary.passed ?? r.passed ?? 0;
    const failed = summary.failed ?? r.failed ?? 0;
    const passRate = r.passRate ?? 0;
    const failedItems = [];
    if (Array.isArray(r.tests)) {
      for (const t of r.tests) {
        const status = (t.status || "").toLowerCase();
        if (status === "failed" || status === "fail") {
          failedItems.push({ title: t.title || t.testPoint || t.name || "(unnamed)", module: t.moduleLabel || t.module || t.moduleName || "", error: (t.error || t.comment || "").split("\n")[0].slice(0, 220) });
        }
      }
    }
    if (failedItems.length === 0 && Array.isArray(r.suites)) {
      for (const s of r.suites) {
        const status = (s.status || "").toLowerCase();
        if (status === "fail" || status === "failed") {
          failedItems.push({ title: s.name || "(unnamed suite)", module: s.category || "", error: s.failure_reason || "" });
        }
      }
    }
    out.push({ timestamp: ts, total, passed, failed, passRate, timeSavedPercent: r.timeSavedPercent, avgLatencyMs: r.avgLatencyMs, failedItems });
  }
  return out;
}

async function fetchAll() {
  return Promise.all(PROJECTS.map(async (p, idx) => {
    try {
      const resp = await fetch(p.runs, { cache: "no-cache" });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const raw = await resp.json();
      const runs = normalize(raw, p.format).map((r) => ({ ...r, _date: parseToDate(r.timestamp) })).filter((r) => r._date);
      runs.sort((a, b) => b._date - a._date);
      runs.forEach((r, i) => { r._id = i; });
      return { idx, project: p, runs, error: null };
    } catch (e) {
      return { idx, project: p, runs: [], error: String(e.message || e) };
    }
  }));
}

function buildStripCells(runsInWindow, days) {
  const today = todayKey();
  const cells = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    cells.push({ key: dateKeyIST(d), runs: [] });
  }
  const byKey = new Map(cells.map((c) => [c.key, c]));
  for (const r of runsInWindow) {
    const k = dateKeyIST(r._date);
    if (byKey.has(k)) byKey.get(k).runs.push(r);
  }
  return cells.map((c) => {
    let cls = "strip-cell";
    if (c.runs.length) {
      cls += " has-run";
      const failedCount = c.runs.filter((r) => r.failed > 0).length;
      if (failedCount === 0) cls += " all-pass";
      else if (failedCount === c.runs.length) cls += " all-fail";
      else cls += " some-fail";
    }
    if (c.key === today) cls += " is-today";
    const failedRuns = c.runs.filter((r) => r.failed > 0).length;
    const tip = c.runs.length === 0
      ? `${c.key} — no runs`
      : failedRuns === 0
        ? `${c.key} — ${c.runs.length} run${c.runs.length === 1 ? "" : "s"} all passed`
        : `${c.key} — ${failedRuns}/${c.runs.length} runs failed`;
    return { cls, tip, key: c.key };
  });
}

function severity(failedRuns, totalRuns) {
  if (totalRuns === 0) return "error";
  if (failedRuns === 0) return "ok";
  return failedRuns / totalRuns >= 0.5 ? "danger" : "warn";
}

function render() {
  if (!cache) return;
  const cutoff = currentWindow > 0 ? Date.now() - currentWindow * 86400000 : 0;
  const stripDays = Math.min(currentWindow, 30);
  let totalDowntimeDays = 0, totalFailedRuns = 0, totalFailedTests = 0, projectsAffected = 0, healthy = [];
  const failingHtml = [];

  for (const entry of cache) {
    const { project, runs, error, idx } = entry;
    if (error) {
      failingHtml.push(`
        <div class="proj">
          <div class="proj-head">
            <div class="proj-num error">!</div>
            <div class="proj-info">
              <div class="proj-name">${esc(project.name)}</div>
              <div class="proj-summary">Could not load feed — <span class="mono">${esc(error)}</span></div>
            </div>
          </div>
        </div>`);
      continue;
    }

    const inWindow = runs.filter((r) => !cutoff || r._date.getTime() >= cutoff);
    const failedRuns = inWindow.filter((r) => r.failed > 0);
    const failedTestsCount = failedRuns.reduce((s, r) => s + r.failed, 0);

    if (failedRuns.length === 0) {
      healthy.push({ project, runs: inWindow.length });
      continue;
    }

    projectsAffected++;
    totalFailedRuns += failedRuns.length;
    totalFailedTests += failedTestsCount;

    // Group by IST date
    const byDate = new Map();
    for (const r of failedRuns) {
      const k = dateKeyIST(r._date);
      if (!byDate.has(k)) byDate.set(k, []);
      byDate.get(k).push(r);
    }
    const dateKeys = [...byDate.keys()].sort().reverse();
    totalDowntimeDays += dateKeys.length;

    const showAll = !!expandedDays[idx];
    const visibleDates = showAll ? dateKeys : dateKeys.slice(0, DEFAULT_VISIBLE_DAYS);
    const hiddenCount = dateKeys.length - visibleDates.length;

    const daysHtml = visibleDates.map((k) => {
      const list = byDate.get(k);
      const rel = relativeDay(k);
      const totalFailedThisDay = list.reduce((s, r) => s + r.failed, 0);
      const timesHtml = list.map((r) => {
        const runKey = `${idx}-${r._id}`;
        const isOpen = openRuns.has(runKey);
        return `<span class="time-pill ${isOpen ? "is-open" : ""}" data-run="${esc(runKey)}">${esc(fmtTime(r._date))} <span class="counts"><strong>${r.failed}</strong>/${r.total}</span></span>`;
      }).join("");

      // Render expanded run details for any open run on this day
      const detailsHtml = list.filter((r) => openRuns.has(`${idx}-${r._id}`)).map((r) => renderRunDetail(r, idx)).join("");

      return `
        <div class="day">
          <div class="day-head">
            <span class="day-bullet"></span>
            <span class="day-date">${esc(fmtFullDate(list[0]._date))}</span>
            ${rel ? `<span class="day-rel ${rel.strong ? "" : "faint"}">${esc(rel.label)}</span>` : ""}
            <span class="day-counts">${list.length} failed run${list.length === 1 ? "" : "s"}<span class="sub"> · ${totalFailedThisDay} test${totalFailedThisDay === 1 ? "" : "s"}</span></span>
          </div>
          <div class="times">${timesHtml}</div>
          ${detailsHtml}
        </div>`;
    }).join("");

    const showMoreBtn = hiddenCount > 0
      ? `<div class="show-more"><button data-action="show-more" data-idx="${idx}">Show ${hiddenCount} more downtime day${hiddenCount === 1 ? "" : "s"}</button></div>`
      : (showAll && dateKeys.length > DEFAULT_VISIBLE_DAYS ? `<div class="show-more"><button data-action="show-more" data-idx="${idx}">Show fewer</button></div>` : "");

    const sev = severity(failedRuns.length, inWindow.length);
    const everyFailed = failedRuns.length === inWindow.length && inWindow.length > 1;
    const stripCells = buildStripCells(inWindow, stripDays);

    failingHtml.push(`
      <div class="proj">
        <div class="proj-head">
          <div class="proj-num ${sev === "danger" ? "danger" : "warn"}">${dateKeys.length}</div>
          <div class="proj-info">
            <div class="proj-name">${esc(project.name)} <a class="dlink" href="${esc(project.dashboard)}" target="_blank" rel="noopener">↗ open dashboard</a></div>
            <div class="proj-summary">Down on <strong>${dateKeys.length}</strong> day${dateKeys.length === 1 ? "" : "s"} · <strong>${failedRuns.length}</strong> of ${inWindow.length} run${inWindow.length === 1 ? "" : "s"} failed · ${failedTestsCount} test${failedTestsCount === 1 ? "" : "s"} broken${everyFailed ? `<span class="every">every run failed</span>` : ""}</div>
          </div>
        </div>
        <div class="strip">${stripCells.map((c) => `<div class="${c.cls}" title="${esc(c.tip)}"></div>`).join("")}</div>
        <div class="strip-axis"><span>${esc(stripCells[0].key)}</span><span>${esc(stripCells[stripCells.length - 1].key)} · today</span></div>
        <div class="proj-body">
          ${daysHtml}
          ${showMoreBtn}
        </div>
      </div>`);
  }

  // Stats
  document.getElementById("statsBar").innerHTML = `
    <div class="stat brand"><span class="ic"></span><div class="text"><span class="l">Window</span><span class="v">${currentWindow}d</span></div></div>
    <div class="stat ${projectsAffected > 0 ? "danger" : "ok"}"><span class="ic"></span><div class="text"><span class="l">Projects with downtime</span><span class="v">${projectsAffected}<span class="of">/${PROJECTS.length}</span></span></div></div>
    <div class="stat ${totalFailedRuns > 0 ? "danger" : "ok"}"><span class="ic"></span><div class="text"><span class="l">Failed runs</span><span class="v">${totalFailedRuns}</span></div></div>
    <div class="stat ${totalFailedTests > 0 ? "danger" : "ok"}"><span class="ic"></span><div class="text"><span class="l">Failed tests</span><span class="v">${totalFailedTests}</span></div></div>
  `;

  // Healthy strip
  let healthyHtml = "";
  if (healthy.length) {
    const items = healthy.map((h) => `<span class="h-pill">${esc(h.project.name)} <span class="num">${h.runs} run${h.runs === 1 ? "" : "s"}</span></span>`).join("");
    healthyHtml = `<div class="healthy"><span class="h-label">All passing · ${healthy.length}</span>${items}</div>`;
  }

  let header = "";
  if (failingHtml.length > 0) header = `<div class="section-label">Projects with downtime <span class="count">· ${projectsAffected}</span></div>`;

  document.getElementById("content").innerHTML =
    healthyHtml +
    header +
    (failingHtml.length ? failingHtml.join("") : `<div class="proj"><div class="empty-line ok">🎉 No downtime in this window across any project.</div></div>`);

  bindHandlers();
}

function renderRunDetail(r, projIdx) {
  let extra = "";
  if (r.avgLatencyMs != null) extra = `avg latency ${(r.avgLatencyMs / 1000).toFixed(1)}s`;
  else if (r.timeSavedPercent != null) extra = `time saved ${r.timeSavedPercent}%`;
  else if (r.avgLatency != null) extra = `avg latency ${(r.avgLatency / 1000).toFixed(1)}s`;

  let body;
  if (!r.failedItems || r.failedItems.length === 0) {
    body = `<div class="fno-detail">This feed doesn't expose per-test detail — ${r.failed} test${r.failed === 1 ? "" : "s"} failed in this run.</div>`;
  } else {
    body = `<ul class="fails-list">${r.failedItems.slice(0, 30).map((f) => `<li>
      <div><span class="ftitle">${esc(f.title)}</span>${f.module ? `<span class="fmod">${esc(f.module)}</span>` : ""}</div>
      ${f.error ? `<div class="ferr">${esc(f.error)}</div>` : ""}
    </li>`).join("")}${r.failedItems.length > 30 ? `<li class="fno-detail">+${r.failedItems.length - 30} more failed item${r.failedItems.length - 30 === 1 ? "" : "s"}…</li>` : ""}</ul>`;
  }

  return `
    <div class="run-detail is-open">
      <div class="run-detail-row">
        <span class="label">Run @ ${esc(fmtTime(r._date))}</span>
        <span class="pass">${r.passRate}% pass</span>
        ${extra ? `<span class="extra">${esc(extra)}</span>` : ""}
      </div>
      ${body}
    </div>`;
}

function bindHandlers() {
  document.querySelectorAll(".time-pill").forEach((p) => {
    p.addEventListener("click", () => {
      const k = p.getAttribute("data-run");
      if (openRuns.has(k)) openRuns.delete(k); else openRuns.add(k);
      render();
    });
  });
  document.querySelectorAll('[data-action="show-more"]').forEach((b) => {
    b.addEventListener("click", () => {
      const idx = +b.getAttribute("data-idx");
      expandedDays[idx] = !expandedDays[idx];
      render();
    });
  });
}

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function load() {
  const refreshBtn = document.getElementById("refreshBtn");
  refreshBtn.classList.add("spinning");
  document.getElementById("content").innerHTML = '<div class="loading"><div class="spinner"></div>Loading project feeds…</div>';
  document.getElementById("lastFetched").textContent = "…";
  cache = await fetchAll();
  document.getElementById("lastFetched").textContent = new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata", day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit", hour12: true }) + " IST";
  expandedDays = {}; openRuns = new Set();
  render();
  setTimeout(() => refreshBtn.classList.remove("spinning"), 400);
}

document.querySelectorAll(".pill").forEach((p) => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".pill").forEach((x) => x.classList.remove("active"));
    p.classList.add("active");
    currentWindow = +p.getAttribute("data-days");
    expandedDays = {}; openRuns = new Set();
    render();
  });
});
document.getElementById("refreshBtn").addEventListener("click", load);
load();
</script>
</body>
</html>
